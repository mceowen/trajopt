udot_max: [5.0, 5.0, 5.0]
udot_max_idx: [0, 1, 2]

u_min_idx: []
u_max_idx: []

path_lim: []
path_idx: []
aux_idx:  []

custom_input_dict:
  u_norm_min: 0.21
  u_norm_max: 8.12
  theta_max : 100.0