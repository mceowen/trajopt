# Dimensional mission configuration (no nondim)
module_path: "trajopt.core.modules.mission.ghame"

planet_name: "earth"
vehicle_name: "ghame"

flags:
  flag_nfz: 0
  init_ctrl: 0
  final_ctrl: 0
  aero_type: 'exponential'  # 'exponential', 'jax_lookup', 'spline', 'none'

# no fly zones options
obs:
  xc: [5,-6.5]
  yc: [30,50]
  rc: [5,5]

# state min/max constraints
z_min: "eval: np.array([mission['planet']['r'], 100.0])"
z_min_idx: [0, 3]
z_max: []
z_max_idx: []

# initial state constraints
zi: "eval: np.array([mission['planet']['r'] + 80e3, 0.0, 0.0, 5612, -0.5, 90.0])"
zi_idx: [0, 1, 2, 3, 4, 5]
zi_min: []
zi_min_idx: []
zi_max: []
zi_max_idx: []

# final state constraints
zf: "eval: np.array([(mission['planet']['r'] + 10e3)])"
zf_idx: [0]
zf_min: []
zf_min_idx: []
zf_max: []
zf_max_idx: []

# control min/max constraints
u_min: [-45]
u_max: [45]

u_min_idx: [0]
u_max_idx: [0]

# control boundary conditions
ui: []
uf: []

ui_idx: []
uf_idx: []

# control rate constraints
udot_max: [10]
udot_max_idx: [0]

path_limits: {}

custom_limits: {}

custom_input_dict: {}

costs:
- fcn: "trajopt.core.modules.mission.ghame.terminal_cost"
  analytical_affine_approximation: "trajopt.core.modules.mission.ghame.analytical_affine_approximation_terminal_cost"
  convex: 1
  auto_diff: 0
  category: "terminal"

- fcn: "trajopt.core.modules.mission.ghame.running_cost"
  analytical_affine_approximation: "trajopt.core.modules.mission.ghame.analytical_affine_approximation_running_cost"
  convex: 1
  auto_diff: 0
  category: "running"