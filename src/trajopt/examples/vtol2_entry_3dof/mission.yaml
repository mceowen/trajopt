# Dimensional mission configuration (no nondim)
mission_name: "vtol"

planet_name: "earth"
vehicle_name: "vtol"

bools:
  flag_nfz: 0
  init_ctrl: 0
  final_ctrl: 0
  aero_type: 'exponential'  # 'exponential', 'jax_lookup', 'spline', 'none'

# no fly zones options
nfz_option_list:
- xc: []
  yc: []
  rc: []

- xc: [5,-6.5]
  yc: [30,50]
  rc: [5,5]

# state min/max constraints
z_min: []
z_min_idx: []
z_max: []
z_max_idx: []

# initial state constraints
zi: [10000, 0.0, 0.0, 7450, -0.5, 0.0]
zi_idx: [0, 1, 2, 3, 4, 5]
zi_min: []
zi_min_idx: []
zi_max: []
zi_max_idx: []

# final state constraints
zf: "eval: np.array(12, 70, -10, 90])"
zf_idx: [1, 2, 4, 5]
zf_min: []
zf_min_idx: []
zf_max: "eval: np.array([(mission['planet']['r'] + 35e3)])"
zf_max_idx: [1]

# control min/max constraints
u_min: [-80.0, 0]
u_max: [80.0, 40]

u_min_idx: [0, 1]
u_max_idx: [0, 1]

# control boundary conditions
ui: []
uf: []

ui_idx: []
uf_idx: []

# control rate constraints
udot_max: [10, 5]
udot_max_idx: [0, 1]

path_lim: [] #[15e5/45, 18e3, 2.5]
path_idx: [] #[0, 1, 2]
aux_idx: []

custom_input_dict: {}