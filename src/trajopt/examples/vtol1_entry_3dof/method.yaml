  eps_defect: [0.01]
  eps_dyn: [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 80

weights:
  w_cost: 10.0
  eps_nonzero1: 0.2
  eps_nonzero2: 0.0000000001
  alpha_z: 0.5
  alpha_u: 0.5
  
nl_guess_u_start: [0.0]
