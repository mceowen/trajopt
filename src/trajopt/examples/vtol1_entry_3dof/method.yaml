  buff_dyn:           "term"    # 'term', 'l1', 'l2', 'quad-1', 'quad-2'
  buff_dyn_dual:      "none"    # 'l1', 'none'
  ctcs:               'none'  # 0, 1
  ctcs_dual:          "none"    # 'l1', 'none'
  ode_fixed_dt:       0         # 0, 1
  nondim:             1         # 0, 1
  jax_dyn:            1         # 0, 1

  flag_path:    1.0
  flag_nfz:     1.0
  flag_custom:  1.0
  flag_term:    1.0
  flag_dyn:     1.0
  flag_tr:      1.0
  flag_true:    1.0
  flag_dual:    1.0
  flag_vb:      1.0

