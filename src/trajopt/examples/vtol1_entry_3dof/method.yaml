'N': 40

flags:
  free_final_time: 1      # 0, 1
  dynamics_nonconvex: 1  # 0, 1
  equal_dt: 1             # 0, 1
  flag_autotune: "0"      # '0', '1', '2
  buff_dyn: "term"        # 'term', 'l1', 'l2', 'quad-1', 'quad-2'
  buff_dyn_dual: "none"   # 'l1', 'none'
  ctcs: 'l1'                 # 0, 1
  ode_fixed_dt: 0         # 0, 1
  nondim: 1               # 0, 1
  jax_dyn: 1              # 0, 1

solver_opts:
  solver: "QOCO"

T_init: 1700
T_min: 550.0
T_max: 3000.0
dT_max: 450.0

conv:
  ctcs_mult_state: 0.5
  ctcs_mult_cnst: 2.0
  eps_ctcs: 1e-4
  eps_state: [500, 1, 1, 50, 1, 1]
  eps_cost: 1
  eps_nfz: [0.1, 0.1]
  eps_path: [100.0, 100.0, 0.1]
  eps_term: [333.0, 0.1, 0.1, 100, 0.1, 0.1]
  eps_term_min: [10.0, 1.0, 1.0, 10.0, 1.0, 1.0]
  eps_term_max: [10.0, 1.0, 1.0, 10.0, 1.0, 1.0]
  eps_defect: [0.01]
  eps_dyn: [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 80

weights:
  w_cost:         1.0
  alpha_z:        0.5
  alpha_u:        10.0
  beta:           0.1
  gamma:          1.0
  eps_nonzero1:   0.0000000001
  eps_nonzero2:   0.001
  wbuff:          1000.0
  w_nfz_scale:    10.0
  w_path_scale:   10.0
  w_custom_scale: 0.0
  w_dyn_scale:    100000.0
  w_term_scale:   100.0
  
nl_guess_u_start: [0.0]
nl_guess_u_stop: [0.0]

line_guess_u_init: "eval: np.tile([5.0], (method['N'], 1))"