  buff_dyn:           "term"  # "none", 'term', 'l1', 'l2', 'quad-1', 'quad-2', 'quad-3', 'l1_dual'
  buff_dyn_dual:      "none"  # 'l1', 'none'
  ctcs:               "none"  # 'none', 'term', 'l1', 'l2', 'quad-1', 'quad-2', 'quad-3'
