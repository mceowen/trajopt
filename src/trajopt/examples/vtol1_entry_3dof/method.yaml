  eps_defect: [0.01]
  eps_dyn: [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 80

weights:
  w_cost:         1.0
  alpha_z:        0.5
  alpha_u:        10.0
  beta:           0.1
  gamma:          1.0
  eps_nonzero1:   0.0000000001
  eps_nonzero2:   0.001
  wbuff:          100.0
  w_nfz_scale:    10.0
  w_path_scale:   10.0
  w_custom_scale: 0.0
  w_dyn_scale:    10000.0
  w_term_scale:   100.0
  
nl_guess_u_start: [0.0]
nl_guess_u_stop: [0.0]

