# Dimensional model configuration (no nondim)
model_name: "reentry_3dof"

# State/control dimensions
n: 6
m: 1

z_types: ["d", "ang", "ang", "v", "ang", "ang"]
u_types: ["ang"]

anchor_types : ["t", "v", "m"]

anchor_scales: > 
  eval:
  np.array([(mission['planet']['r']/mission['planet']['g'])**0.5,
  (mission['planet']['r']*mission['planet']['g'])**0.5,
  mission['vehicle']['mass']])

base_unit_labels: ["m", "s", "kg"]

flags:
  ctrl_type: "bank_only"