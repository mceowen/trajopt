flags:
  free_final_time:    1
  equal_dt:           1
  zoh_dilation:       1
  ode_fixed_dt:       0
  flag_conv:          1
  ignore_dpp:         0
  discretize: ms
  eps_state: [0.001]
  iter_max: 300

weights:
  alpha_z: 0.5
  alpha_nu: 0.5

penalty:
  default:
    W:
      penalty: True
      autotune: True
      init: 1.0
    dual:
      penalty: True
      autotune: True
      init: 0.0
      beta: 1.0
    vb: 'standard'
    eps: [0.0001]

solver_opts:
  solver: QOCO
