method:
  inherit: trajopt/methods/configs/autoscvx.yaml

  solver_opts:
    solver: CLARABEL

trajectory:
  segments:
    flight:
      num_nodes: 20
      inherit: trajopt/models/configs/quadrotor_3dof.yaml

      fcns:
        thrust_norm:      trajopt/models/quadrotor_3dof.py:thrust_norm
        obstacle:         trajopt/models/quadrotor_3dof.py:obstacle
        max_thrust_cone:  trajopt/models/quadrotor_3dof.py:max_thrust_cone
        height:           trajopt/models/quadrotor_3dof.py:height
        pos_x:            trajopt/models/quadrotor_3dof.py:pos_x
        pos_y:            trajopt/models/quadrotor_3dof.py:pos_y
        xz:               trajopt/models/quadrotor_3dof.py:xz
        yz:               trajopt/models/quadrotor_3dof.py:yz
        one:              trajopt/models/quadrotor_3dof.py:one
        u_squared:        trajopt/models/quadrotor_3dof.py:u_squared

      params:
        planet:
          inherit: trajopt/missions/configs/planets/earth.yaml
        vehicle:
          inherit: trajopt/missions/configs/vehicles/quadrotor.yaml

      constraints:
        dynamics:
          type: dynamics
          fcn: fcns.dynamics

        initial_state:
          type: initial_state
          value: [0.0, 0.0, 5.0, 0.0, 0.5, 0.0]

        final_state:
          type: final_state
          value: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]

        max_thrust:
          type: convex_inequality
          fcn: fcns.max_thrust_cone

        min_thrust:
          type: nonconvex_inequality
          fcn: fcns.thrust_norm
          lower: "${params.vehicle.T_min}"

        obstacle:
          type: nonconvex_inequality
          fcn: fcns.obstacle
          lower: 4.0

        final_time:
          type: final_time
          lower: 1.0
          upper: 10.0

      costs:
        # min_time:
        #   type: nonconvex_running
        #   fcn: fcns.one
        
        min_control_effort:
          type: nonconvex_running
          fcn: fcns.u_squared

      guess:
        type: straight_line
        t_start: 0.0
        t_stop: 10.0
        x_start: [0.0, 0.0, 5.0, 0.0, 0.5, 0.0]
        x_stop: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
        u_start: [0, 0, 1]
        u_stop: [0, 0, 1]

analysis:
  type: standalone
  compute_iters: true
  show_iters: true
  show_convergence: false
  show_weights: false
