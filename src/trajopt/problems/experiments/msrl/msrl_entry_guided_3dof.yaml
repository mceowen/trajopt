trajectory:
  segments:
    entry:
      num_nodes: 100
      inherit: trajopt/models/configs/reentry_3dof.yaml

      fcns:
        density_model: trajopt/missions/msrl.py:density_model
        nonlinear_aero: trajopt/missions/msrl.py:nonlinear_aero

      params:
        planet:
          inherit: trajopt/missions/configs/planets/mars.yaml
        vehicle:
          inherit: trajopt/missions/configs/vehicles/msrl.yaml

        # density polynomial coefficients
        a: -4.418967
        b: -56.76770
        c: 1.621266
        d: 379.3357
        e: 8564.256
        f: 8414.405
        g: -988.7042
        h: 4461.988
        i: 31.36062

        # lift polynomial coefficients
        a_l: 0.679945
        b_l: -9.522473
        c_l: 59.179219
        d_l: -215.423516
        e_l: 510.853276
        f_l: -830.748818
        g_l: 950.127376
        h_l: -771.365024
        i_l: 443.191605
        j_l: -177.601759
        k_l: 48.232018
        l_l: -8.362472
        m_l: 1.177526

        # drag polynomial coefficients
        a_d: 1.458554
        b_d: -20.501723
        c_d: 128.239298
        d_d: -470.835046
        e_d: 1126.686522
        f_d: -1844.173832
        g_d: 2106.728736
        h_d: -1681.164677
        i_d: 921.349863
        j_d: -333.513962
        k_d: 74.164741
        l_d: -8.758177
        m_d: 1.684456

      constraints:
        dynamics:
          type: dynamics
          fcn: fcns.dynamics

        initial_state:
          type: initial_state
          value: [3456160, 68.20, 14.12, 7935.15, -7.7075, 62.2803]
        
        final_cross_range_down_range:
          type: final_nonconvex_inequality
          fcn: fcns.downrange_crossrange
          upper: []
          lower: []

        state_limits:
          type: state_limits
          lower: ["${params.planet.r}", null, null, 100.0, null, null]
          # upper: [null , null, null, null, null, null]

        bank_aoa_angle_limits:
          type: control_limits
          lower: [-170.0, null]
          upper: [170.0, null]

        bank_angle_rate_limit:
          type: control_rate_limit
          value: [10]
          idx: [0]

      costs:
        min_terminal_velocity:
          type: nonconvex_terminal
          fcn: fcns.velocity

      guess:
        t_start: 0.0
        t_stop: 150.0
        u_start: [120.0, 0.0]
        u_stop: [0, 0.0]

method:
  inherit: trajopt/methods/configs/autoscvx.yaml

  flags:
    equal_dt: 1
    zoh_dilation: 1
    free_final_time: 1

  solver_opts:
    solver: PIQP

analysis:
  type: standalone
  compute_iters: false
  show_iters: false
  show_convergence: false
  show_weights: false
