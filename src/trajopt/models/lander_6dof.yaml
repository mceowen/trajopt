# ===============================
# MODEL CONFIGURATION
# ===============================

state: 
  mass.idx: [0]
  pos.idx: [1, 2, 3]
  vel.idx: [4, 5, 6]
  quat.idx: [7, 8, 9, 10]
  angv.idx: [11, 12, 13]

control:
  thrust.idx: [0, 1, 2]

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/lander_6dof.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.final_control:
  type: equality_bc
  set: control
  boundary: final

constraints.state_limits:
  type: box
  set: state

constraints.gimbal_limit:
  type: axis_angle_cone
  set: control
  axis: [1, 0, 0]
  idx: [0, 1, 2]

constraints.glide_slope:
  type: axis_angle_cone
  set: state
  axis: [1, 0, 0]
  idx: [1, 2, 3]

constraints.max_thrust:
  type: max_norm_cone
  set: control
  idx: [0, 1, 2]

constraints.max_angular_velocity:
  type: max_norm_cone
  set: state
  idx: [11, 12, 13]

constraints.tilt_limit:
  type: quaternion_cone
  axis_num: 1
  quat_start_idx: 7

constraints.min_thrust:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/lander_6dof.py:thrust
  dimension: 1
  ct: 0

# ===============================
# COST MODELS
# ===============================

costs.min_time:
  type: min_time

costs.control_effort:
  type: control_effort
  idx: [0, 1, 2]