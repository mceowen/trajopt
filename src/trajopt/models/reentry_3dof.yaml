# ===============================
# MODEL CONFIGURATION
# ===============================

fcns:
  lift_drag: trajopt/models/reentry_3dof.py:lift_drag
  heat_rate: trajopt/models/reentry_3dof.py:heat_rate
  dynamic_pressure: trajopt/models/reentry_3dof.py:dynamic_pressure
  aero_load: trajopt/models/reentry_3dof.py:aero_load
  dynamics: trajopt/models/reentry_3dof.py:dynamics
  long_lat: trajopt/models/reentry_3dof.py:long_lat
  long_lat_alt: trajopt/models/reentry_3dof.py:long_lat_alt
  density_model: trajopt/models/reentry_3dof.py:exp_density
  altitude: trajopt/models/reentry_3dof.py:altitude
  longitude: trajopt/models/reentry_3dof.py:longitude
  latitude: trajopt/models/reentry_3dof.py:latitude
  velocity: trajopt/models/reentry_3dof.py:velocity
  fpa: trajopt/models/reentry_3dof.py:fpa
  heading: trajopt/models/reentry_3dof.py:heading
  bank: trajopt/models/reentry_3dof.py:bank
  aoa: trajopt/models/reentry_3dof.py:aoa

state.r:
    idx: [0]
state.theta:
    idx: [1]
state.phi:
    idx: [2]
state.v:
    idx: [3]
state.gamma:
    idx: [4]
state.psi:
    idx: [5]

control.bank:
    idx: [0]
control.aoa:
    idx: [1]

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: fcns.dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.initial_control:
  type: equality_bc
  set: control
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.final_bank_angle:
  type: equality_bc
  set: control
  value: null
  idx: null
  boundary: final

constraints.state_limits:
  type: box
  set: state
  min_value: []
  min_value_idx: []
  max_value: []
  max_value_idx: []

constraints.control_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_limit:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_aoa_angle_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.bank_aoa_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: "fcns.heat_rate * 0.0001"
  eps: null
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: "fcns.dynamic_pressure"
  eps: null
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: "fcns.aero_load"
  eps: null
  dimension: 1
  ct: 0

# ===============================
# COST MODELS
# ===============================

costs.min_time:
  type: min_time

costs.min_terminal_velocity:
  type: terminal_state
  value: null
  idx: [3]

costs.min_max_heat_rate:
    type: nonconvex
    minimax: 1
    fcn: fcns.heat_rate
    units: [{none: 1}]
    ct: 0

trajectories:
  altitude:
    type: time_series
    fcn: "fcns.altitude * 0.001"
    group: state
    title: "Altitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Altitude (km)"

  longitude:
    type: time_series
    fcn: fcns.longitude
    group: state
    title: "Longitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Longitude (deg)"

  latitude:
    type: time_series
    fcn: fcns.latitude
    group: state
    title: "Latitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Latitude (deg)"

  velocity:
    type: time_series
    fcn: fcns.velocity
    group: state
    title: "Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Velocity (m/s)"

  fpa:
    type: time_series
    fcn: fcns.fpa
    group: state
    title: "Flight Path Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Flight Path Angle (deg)"

  heading:
    type: time_series
    fcn: fcns.heading
    group: state
    title: "Heading Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Heading Angle (deg)"

  bank_angle:
    type: time_series
    fcn: fcns.bank
    group: control
    title: "Bank Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Bank Angle (deg)"

  angle_of_attack:
    type: time_series
    fcn: fcns.aoa
    group: control
    title: "Angle of Attack vs Time"
    xlabel: "Time (s)"
    ylabel: "Angle of Attack (deg)"

  long_lat_trajectory_plot:
    type: spatial
    fcn: fcns.long_lat
    group: state_trajplots
    title: "Longitude vs Latitude"
    xlabel: "Longitude (deg)"
    ylabel: "Latitude (deg)"
    tick_nbins: 4
  
  long_lat_alt_trajectory_plot:
    type : spatial
    fcn: "fcns.long_lat_alt * [1, 1, 0.001]"
    group: state_trajplots
    title: "3D Trajectory"
    xlabel: "Longitude (deg)"
    ylabel: "Latitude (deg)"
    zlabel: "Altitude (km)"
    tick_nbins: 4

  heat_rate:
    type: time_series
    fcn: "fcns.heat_rate * 0.0001"
    group: path
    title: "Heat Rate vs Time"
    xlabel: "Time (s)"
    ylabel: "Heat Rate (W/cm²)"

  dynamic_pressure:
    type: time_series
    fcn: "fcns.dynamic_pressure * 0.001"
    group: path
    title: "Dynamic Pressure vs Time"
    xlabel: "Time (s)"
    ylabel: "Dynamic Pressure (kPa)"

  aero_load:
    type: time_series
    fcn: "fcns.aero_load / 9.81"
    group: path
    title: "Aerodynamic Load vs Time"
    xlabel: "Time (s)"
    ylabel: "Aerodynamic Load (g)"

# ===============================
# PLOT CONFIGURATION
# ===============================

plot_config:
  limits_all_iters: true
  trajectory_groups:
    state:
      figsize: [12, 4.2]
      grid_gap_x: 0.06
      grid_gap_y: 0.14
      margins: [0.07, 0.02, 0.04, 0.12]

    control:
      figsize: [8, 2.6]
      grid_gap_x: 0.08
      margins: [0.08, 0.02, 0.04, 0.14]

    state_trajplots:
      figsize: [10, 3.0]
      width_ratios: [1, 2]
      grid_gap_x: -0.10
      pad_3d: 0.0
      margins: [0.08, 0.02, 0.04, 0.14]

    path:
      figsize: [12, 2.6]
      grid_gap_x: 0.05
      margins: [0.07, 0.02, 0.04, 0.14]

    density_comparison:
      figsize: [10, 2.6]
      grid_gap_x: 0.08
      margins: [0.07, 0.02, 0.04, 0.14]

    density_vs_alt_comparison:
      figsize: [10, 2.6]
      grid_gap_x: 0.08
      margins: [0.07, 0.02, 0.04, 0.14]