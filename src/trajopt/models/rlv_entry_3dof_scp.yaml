# ===============================
# MODEL CONFIGURATION
# ===============================

fcns:
  dynamics:  trajopt/models/rlv_entry_3dof_scp.py:dynamics
  altitude:  trajopt/models/rlv_entry_3dof_scp.py:altitude
  longitude: trajopt/models/rlv_entry_3dof_scp.py:longitude
  latitude:  trajopt/models/rlv_entry_3dof_scp.py:latitude
  velocity:  trajopt/models/rlv_entry_3dof_scp.py:velocity
  fpa:       trajopt/models/rlv_entry_3dof_scp.py:fpa
  heading:   trajopt/models/rlv_entry_3dof_scp.py:heading
  aoa:       trajopt/models/rlv_entry_3dof_scp.py:aoa
  bank:      trajopt/models/rlv_entry_3dof_scp.py:bank
  heat_rate: trajopt/models/rlv_entry_3dof_scp.py:heat_rate
  long_lat:  trajopt/models/rlv_entry_3dof_scp.py:long_lat

state.r:
    idx: [0]
state.theta:
    idx: [1]
state.phi:
    idx: [2]
state.v:
    idx: [3]
state.gamma:
    idx: [4]
state.psi:
    idx: [5]

control.aoa:
    idx: [0]
control.bank:
    idx: [1]

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: fcns.dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.state_limits:
  type: box
  set: state
  min_value: []
  min_value_idx: []
  max_value: []
  max_value_idx: []

constraints.control_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

# ===============================
# COST MODELS
# ===============================

costs.max_crossrange:
  type: terminal_state
  idx: [2]
  sign: -1

costs.control_rate_regularization:
  type: rate_regularization
  set: control
  w: 0.1

# ===============================
# TRAJECTORIES
# ===============================

trajectories:
  altitude:
    type: time_series
    fcn: "fcns.altitude * 0.001"
    group: state
    title: "Altitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Altitude (km)"

  velocity:
    type: time_series
    fcn: "fcns.velocity * 0.001"
    group: state
    title: "Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Velocity (km/s)"

  fpa:
    type: time_series
    fcn: fcns.fpa
    group: state
    title: "Flight Path Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "FPA (deg)"

  longitude:
    type: time_series
    fcn: fcns.longitude
    group: state
    title: "Longitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Longitude (deg)"

  latitude:
    type: time_series
    fcn: fcns.latitude
    group: state
    title: "Latitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Latitude (deg)"

  heading:
    type: time_series
    fcn: fcns.heading
    group: state
    title: "Heading Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Heading (deg)"

  angle_of_attack:
    type: time_series
    fcn: fcns.aoa
    group: control
    title: "Angle of Attack vs Time"
    xlabel: "Time (s)"
    ylabel: "AoA (deg)"

  bank_angle:
    type: time_series
    fcn: fcns.bank
    group: control
    title: "Bank Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Bank (deg)"

  ground_track:
    type: spatial
    fcn: fcns.long_lat
    group: spatial
    title: "Ground Track"
    xlabel: "Longitude (deg)"
    ylabel: "Latitude (deg)"
    tick_nbins: 4

plot_config:
  limits_all_iters: true
  trajectory_groups:
    state:
      figsize: [13, 5.5]
      grid_gap_x: 0.06
      grid_gap_y: 0.14
      margins: [0.06, 0.02, 0.06, 0.10]

    control:
      figsize: [9, 2.8]
      grid_gap_x: 0.08
      margins: [0.08, 0.02, 0.06, 0.14]

    spatial:
      figsize: [5, 3.5]
      margins: [0.12, 0.04, 0.06, 0.14]
