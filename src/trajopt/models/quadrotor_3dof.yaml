state:
  x:
    idx: [0]
    title: "X Position vs Time"
    xlabel: "Time (s)"
    ylabel: "X (m)"
  y:
    idx: [1]
    title: "Y Position vs Time"
    xlabel: "Time (s)"
    ylabel: "Y (m)"
  z:
    idx: [2]
    title: "Z Position vs Time"
    xlabel: "Time (s)"
    ylabel: "Z (m)"
  vx:
    idx: [3]
    title: "X Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Vx (m/s)"
  vy:
    idx: [4]
    title: "Y Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Vy (m/s)"
  vz:
    idx: [5]
    title: "Z Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Vz (m/s)"

control:
  Tx:
    idx: [0]
    title: "X Thrust vs Time"
    xlabel: "Time (s)"
    ylabel: "Tx (N)"
  Ty:
    idx: [1]
    title: "Y Thrust vs Time"
    xlabel: "Time (s)"
    ylabel: "Ty (N)"
  Tz:
    idx: [2]
    title: "Z Thrust vs Time"
    xlabel: "Time (s)"
    ylabel: "Tz (N)"

trajectories:
  pos_x:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:pos_x
    group: state_pos
    title: "X Position vs Time"
    xlabel: "Time (s)"
    ylabel: "X (m)"

  pos_y:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:pos_y
    group: state_pos
    title: "Y Position vs Time"
    xlabel: "Time (s)"
    ylabel: "Y (m)"

  height:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:height
    group: state_pos
    title: "Z Position vs Time"
    xlabel: "Time (s)"
    ylabel: "Z (m)"

  vel_x:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:vel_x
    group: state_vel
    title: "X Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Vx (m/s)"

  vel_y:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:vel_y
    group: state_vel
    title: "Y Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Vy (m/s)"

  vel_z:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:vel_z
    group: state_vel
    title: "Z Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Vz (m/s)"

  thrust_x:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:thrust_x
    group: control
    title: "Tx vs Time"
    xlabel: "Time (s)"
    ylabel: "Tx (N)"

  thrust_y:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:thrust_y
    group: control
    title: "Ty vs Time"
    xlabel: "Time (s)"
    ylabel: "Ty (N)"

  thrust_z:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:thrust_z
    group: control
    title: "Tz vs Time"
    xlabel: "Time (s)"
    ylabel: "Tz (N)"

  thrust_norm_traj:
    type: time_series
    fcn: trajopt/models/quadrotor_3dof.py:thrust_norm
    group: control
    title: "Thrust Magnitude vs Time"
    xlabel: "Time (s)"
    ylabel: "‖T‖ (N)"

  xy_trajectory:
    type: spatial
    fcn: trajopt/models/quadrotor_3dof.py:xy
    group: position_trajectories
    title: "XY Trajectory"
    xlabel: "X (m)"
    ylabel: "Y (m)"

  xyz_trajectory:
    type: spatial
    fcn: trajopt/models/quadrotor_3dof.py:xyz
    group: position_trajectories
    title: "XYZ Trajectory"
    xlabel: "X (m)"
    ylabel: "Y (m)"

# ===============================
# PLOT CONFIGURATION
# ===============================

plot_config:
  trajectory_groups:
    state_pos:
      figsize: [12, 2.8]
      grid_gap_x: 0.08
      margins: [0.08, 0.02, 0.06, 0.14]

    state_vel:
      figsize: [12, 2.8]
      grid_gap_x: 0.08
      margins: [0.08, 0.02, 0.06, 0.14]

    control:
      figsize: [12, 2.8]
      grid_gap_x: 0.08
      margins: [0.08, 0.02, 0.06, 0.14]

    position_trajectories:
      figsize: [10, 3.2]
      width_ratios: [1, 2]
      grid_gap_x: -0.10
      pad_3d: 0.0
      margins: [0.08, 0.02, 0.06, 0.14]