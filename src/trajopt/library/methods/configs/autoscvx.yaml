inherit: trajopt/library/methods/configs/shared/default.yaml

time_grid: 

flags:
  free_final_time:    1       # 0, 1
  dynamics_nonconvex: 1       # 0, 1
  equal_dt:           0       # 0, 1
  flag_autotune:      "3"     # '0', '1', '2
  buff_dyn:           "l2"    # 'term', 'l1', 'l2', 'quad-1', 'quad-2'
  buff_dyn_dual:      "none"  # 'l1', 'none'
  ctcs:               "none"  # 0, 1
  ctcs_dual:          "none"  # 'l1', 'none'
  ode_fixed_dt:       0       # 0, 1
  nondim:             1       # 0, 1
  jax_dyn:            1       # 0, 1
  flag_conv:          0       # 0, 1, 2
  ignore_dpp:         0
  discretize: "ms"  # "ms", "ps"

guess: {}

conv:
  ctcs_fac_cnst: 0.5
  eps_ctcs: 1e-8
  eps_state: [0.001]
  eps_cost: 1
  eps_defect: [0.0001]
  eps_dyn: null
  iter_max: 300
  fac_eps: 0.5
  fac_target: 0.01

weights:
  w_cost:         1.0
  alpha_z:        0.5
  alpha_u:        0.5
  beta:           al
  gamma:          al
  eps_nonzero1:   0.0000000001
  eps_nonzero2:   0.0000000001
  config:
    scale_w:
      default: 100.0
      ineq:    100.0
      dyn:     10000.0
      term:    1000.0
  w_ctcs: 100.0

solver_opts:
  solver: QOCO