  iter_max: 20

# Weight structure
weights:
  w_cost: 0.0
  alpha_z: 0.5
  alpha_u: "inf"
  beta: 1.0
  gamma: 0.1
  eps_nonzero1: 0.2
  eps_nonzero2: 0.0000000001
  wbuff: 100.0
  w_path_scale: 1.0
  w_custom_scale: 1.0
  w_nfz_scale: 1.0
  w_dyn_scale: 100000.0
  w_term_scale: 100.0

N: 40

solver_opts:
  solver: "CLARABEL"