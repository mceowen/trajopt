flags:
  auto_jac: 1
  auto_jac_aero: 1
  auto_jac_cnst: 1
  dev_var: 1
  var_scl_flag: 0
  free_final_time: 0
  equal_dt: 0
  flag_autotune: 3
  flag_Wauto_memory: 0
  weight_zero: 0
  stepsize_auto_primal: 0
  stepsize_auto_dual: 0
  flag_conv: 0
  buff_dyn: "term"
  buff_dyn_dual: "none"
  ctcs: "none"
  ode_fixed_dt: 0
  aoa_vb: 0
  jax_dyn: 0

  flag_path:    1.0
  flag_nfz:     1.0
  flag_custom:  1.0
  flag_term:    1.0
  flag_dyn:     1.0
  flag_tr:      1.0
  flag_true:    1.0
  flag_dual:    1.0
  flag_vb:      1.0

# Convergence settings
conv:
  eps_cost:   []
  eps_state:  []
  eps_path:   []
  eps_nfz:    []
