dimensions.n: 15
dimensions.m: 2

params.planet.inherit: trajopt/library/missions/shared/planet/mars.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/msl.yaml

nondim.z_types: ["d", "d", "d", "v", "v", "v", "none", "none", "none", "none", "angv", "angv", "angv", "ang", "ang"]
nondim.u_types: ["angv", "angv"]
nondim.anchor_types: ["t", "v", "m"]
nondim.anchor_scales: ["${(params.planet.r / params.planet.g)**0.5}", "${(params.planet.r * params.planet.g)**0.5}", "${params.vehicle.mass}"]

flags.ctrl_type: bank_only

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/reentry_6dof_fins.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.state_limits:
  type: box
  set: state

constraints.control_limits:
  type: box
  set: control

constraints.quaternion_norm:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:quaternion_norm
  max_val: 1.0
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.minimum_velocity:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:minimum_velocity
  units: [{v: 1}]
  dimension: 1
  ct: 0

constraints.minimum_altitude:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:minimum_altitude
  units: [{d: 1}]
  dimension: 1
  ct: 0

constraints.aoa_limits:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:aoa
  units: [{ang: 1}, {ang: 1}]
  dimension: 2
  ct: 0

constraints.sideslip_limits:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:sideslip
  units: [{ang: 1}, {ang: 1}]
  dimension: 2
  ct: 0

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:heat_rate
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:dynamic_pressure
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof_fins.py:aero_load
  units: [{none: 1}]
  dimension: 1
  ct: 0

costs.min_time:
  type: min_time

costs.min_terminal_velocity:
  type: min_norm_terminal
  x_idx: [3, 4, 5]
