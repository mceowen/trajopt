dimensions.n: 13
dimensions.m: 3

params.planet.inherit: trajopt/library/missions/shared/planet/mars.yaml
params.vehicle.inherit: trajopt/local/vehicles/cobra.yaml

nondim.z_types: ["d", "d", "d", "v", "v", "v", "none", "none", "none", "none", "angv", "angv", "angv"]
nondim.u_types: ["none", "none", "none"]

nondim.anchor_types: ["d", "a", "m"]
nondim.anchor_scales: [250, "${(params.planet.r * params.planet.g)**0.5}", "${params.vehicle.mass}"]

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/reentry_6dof.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.state_limits:
  type: box
  set: state

constraints.control_limits:
  type: box
  set: control

constraints.control_rate_limits:
  type: control_rate_limit

constraints.minimum_quaternion_norm:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:quaternion_norm
  min_value: 0.9
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_quat_norm:
  type: max_norm_cone
  set: state
  idx: [6, 7, 8, 9]

constraints.minimum_velocity:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:velocity
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.minimum_altitude:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:altitude
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.aoa_limits:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:aoa
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.sideslip_limits:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:sideslip
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:heat_rate
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:dynamic_pressure
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:aero_load
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.terminal_altitude:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:altitude
  units: [{none: 1}]
  dimension: 1
  ct: 0

costs.min_time:
  type: min_time

costs.min_terminal_velocity:
  type: min_norm_terminal
  idx: [3, 4, 5]

costs.min_terminal_vel_1:
  type: terminal_state
  idx: 3
