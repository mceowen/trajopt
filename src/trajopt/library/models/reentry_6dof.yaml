# ===============================
# PARAMETERS AND FUNCTIONS
# ===============================

params.planet.inherit: trajopt/library/missions/shared/planet/mars.yaml
params.vehicle.inherit: trajopt/local/vehicles/cobra.yaml

# ===============================
# STATE AND CONTROL DEFINITIONS
# ===============================

state.pos:
  idx: [0, 1, 2]
  units: d

state.vel:
  idx: [3, 4, 5]
  units: v

state.quat:
  idx: [6, 7, 8, 9]
  units: none

state.omega:
  idx: [10, 11, 12]
  units: angv

control.torque:
  idx: [0, 1, 2]
  units: mom

control.flap_deflections:
  idx: [3, 4]
  units: ang

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/reentry_6dof.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.state_limits:
  type: box
  set: state

constraints.control_limits:
  type: box
  set: control

constraints.control_rate_limits:
  type: control_rate_limit

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:heat_rate
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:dynamic_pressure
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:aero_load
  dimension: 1
  ct: 0

constraints.minimum_velocity:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:velocity
  dimension: 1
  ct: 0

constraints.minimum_altitude:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:altitude
  dimension: 1
  ct: 0

constraints.aoa_limits:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:aoa
  dimension: 1
  ct: 0

constraints.sideslip_limits:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:sideslip
  dimension: 1
  ct: 0

constraints.terminal_altitude:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:altitude
  dimension: 1
  ct: 0

constraints.minimum_quaternion_norm:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_6dof.py:quaternion_norm
  min_value: 0.9
  dimension: 1
  ct: 0

constraints.max_quat_norm:
  type: max_norm_cone
  set: state
  idx: [6, 7, 8, 9]

costs.min_time:
  type: min_time

# ===============================
# COST MODELS
# ===============================

costs.min_terminal_velocity:
  type: min_norm_terminal
  idx: [3, 4, 5]

costs.min_terminal_vel_1:
  type: terminal_state
  idx: 3

# ===============================
# TRAJECTORY DEFINITIONS
# ===============================

trajectories:
  long_lat_trajectory_plot:
    type: spatial
    fcn: trajopt/library/models/reentry_6dof.py:long_lat
    group: state_trajplots
  
  long_lat_alt_trajectory_plot:
    type : spatial
    fcn: trajopt/library/models/reentry_6dof.py:long_lat_alt
    group: state_trajplots

  rv_plot:
    type: spatial
    fcn: trajopt/library/models/reentry_6dof.py:r_v
    group: rv

  lut_density:
    type: time_series
    fcn: trajopt/local/aero/cobra_aero_6dof.py:lut_density_jax
    group: density_comparison
  
  exp_density:
    type: time_series
    fcn: trajopt/local/aero/cobra_aero_6dof.py:exp_density_jax
    group: density_comparison