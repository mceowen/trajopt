# ===============================
# MODEL CONFIGURATION
# ===============================

# state vector definition
state.r:
    idx: [0]
    units: d
    title: "Radius vs Time"
    xlabel: "Time (s)"
    ylabel: "Radius (m)"
  
state.theta:
    idx: [1]
    units: deg
    title: "Longitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Longitude (deg)"
  
state.phi:
    idx: [2]
    units: deg
    title: "Latitude vs Time"
    xlabel: "Time (s)"
    ylabel: "Latitude (deg)"
  
state.v:
    idx: [3]
    units: v
    title: "Velocity vs Time"
    xlabel: "Time (s)"
    ylabel: "Velocity (m/s)"
  
state.gamma:
    idx: [4]
    units: deg
    title: "Flight Path Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Flight Path Angle (deg)"
  
state.psi:
    idx: [5]
    units: deg
    title: "Heading Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Heading Angle (deg)"

# control vector definition
control.bank:
    idx: [0]
    units: deg
    title: "Bank Angle vs Time"
    xlabel: "Time (s)"
    ylabel: "Bank Angle (deg)"

control.aoa:
    idx: [1]
    units: deg
    title: "Angle of Attack vs Time"
    xlabel: "Time (s)"
    ylabel: "Angle of Attack (deg)"

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/reentry_3dof.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.initial_control:
  type: equality_bc
  set: control
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.final_bank_angle:
  type: equality_bc
  set: control
  value: null
  idx: null
  boundary: final

constraints.state_limits:
  type: box
  set: state
  min_value: []
  min_value_idx: []
  max_value: []
  max_value_idx: []

constraints.control_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_limit:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_aoa_angle_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.bank_aoa_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:heat_rate
  eps: null
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:dynamic_pressure
  eps: null
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:aero_load
  eps: null
  dimension: 1
  ct: 0

# ===============================
# COST MODELS
# ===============================

costs.min_time:
  type: min_time

costs.min_terminal_velocity:
  type: terminal_state
  value: null
  idx: [3]

costs.min_max_heat_rate:
    type: nonconvex
    minimax: 1
    fcn: trajopt/library/models/reentry_3dof.py:heat_rate
    units: [{none: 1}]
    ct: 0

trajectories:
  long_lat_trajectory_plot:
    type: spatial
    fcn: trajopt/library/models/reentry_3dof.py:long_lat
    group: state_trajplots
    title: "Longitude vs Latitude"
    xlabel: "Longitude (deg)"
    ylabel: "Latitude (deg)"
  
  long_lat_alt_trajectory_plot:
    type : spatial
    fcn: trajopt/library/models/reentry_3dof.py:long_lat_alt
    group: state_trajplots
    title: "Ground Track (3D)"
    xlabel: "Longitude (deg)"
    ylabel: "Latitude (deg)"
    tick_nbins: 4

  heat_rate:
    type: time_series
    fcn: trajopt/library/models/reentry_3dof.py:heat_rate
    group: path
    title: "Heat Rate vs Time"
    xlabel: "Time (s)"
    ylabel: "Heat Rate (W/m²)"

  dynamic_pressure:
    type: time_series
    fcn: trajopt/library/models/reentry_3dof.py:dynamic_pressure
    group: path
    title: "Dynamic Pressure vs Time"
    xlabel: "Time (s)"
    ylabel: "Dynamic Pressure (Pa)"

  aero_load:
    type: time_series
    fcn: trajopt/library/models/reentry_3dof.py:aero_load
    group: path
    title: "Aerodynamic Load vs Time"
    xlabel: "Time (s)"
    ylabel: "Aerodynamic Load (g)"

# ===============================
# PLOT CONFIGURATION
# ===============================
# per-group figure and layout settings (override defaults)
# figsize: [width, height] in inches
# grid_gap_x / grid_gap_y: horizontal / vertical gap between subplots (fraction of figure)
# width_ratios: relative widths of subplots (list, one per subplot)
# margins: [left, right, top, bottom] as fractions of figure

plot_config:
  state:
    figsize: [10, 3.5]
    grid_gap_x: 0.06
    grid_gap_y: 0.18
    margins: [0.06, 0.02, 0.06, 0.14]

  control:
    figsize: [8, 3.5]
    grid_gap_x: 0.08
    grid_gap_y: 0.18
    margins: [0.08, 0.02, 0.06, 0.14]

  trajectory_groups:
    state_trajplots:
      figsize: [10, 4]
      width_ratios: [1, 2.5]
      grid_gap_x: 0.02
      margins: [0.08, 0.02, 0.06, 0.14]

    path:
      figsize: [12, 3.5]
      grid_gap_x: 0.10
      margins: [0.06, 0.02, 0.06, 0.14]

    density_comparison:
      figsize: [10, 3.5]
      grid_gap_x: 0.08
      margins: [0.06, 0.02, 0.06, 0.14]

    density_vs_alt_comparison:
      figsize: [10, 3.5]
      grid_gap_x: 0.08
      margins: [0.06, 0.02, 0.06, 0.14]