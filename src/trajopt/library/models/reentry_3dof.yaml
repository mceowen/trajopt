# ===============================
# MODEL CONFIGURATION
# ===============================
dimensions.n: 6
dimensions.m: 2

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/reentry_3dof.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.final_bank_angle:
  type: equality_bc
  set: control
  value: null
  idx: null
  boundary: final

constraints.state_limits:
  type: box
  set: state
  min_value: []
  min_value_idx: []
  max_value: []
  max_value_idx: []

constraints.control_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_limit:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_aoa_angle_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.bank_aoa_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:heat_rate
  max_val: null
  eps: null
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:dynamic_pressure
  max_val: null
  eps: null
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:aero_load
  max_val: null
  eps: null
  units: [{none: 1}]
  dimension: 1
  ct: 0

# ===============================
# COST MODELS
# ===============================

costs.min_time:
  type: min_time

costs.min_terminal_velocity:
  type: terminal_state
  value: null
  idx: [3]

# TODO (carlos): add back minimax heating cost 
# costs.min_max_heat_rate:
#   type: nonconvex_minmax

# ===============================
# MISC CONFIG
# ===============================

nondim.z_types: ["d", "ang", "ang", "v", "ang", "ang"]
nondim.u_types: ["ang", "ang"]

params.planet.inherit: trajopt/library/missions/shared/planet/mars.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/msl.yaml

nondim.anchor_types : ["t", "v", "m"]
nondim.anchor_scales: ["${(params.planet.r / params.planet.g)**0.5}", "${(params.planet.r * params.planet.g)**0.5}", "${params.vehicle.mass}"]

flags.ctrl_type: "bank_only"

plotting.state_groups:
  "Radius": [0]
  "Theta": [1]
  "Phi": [2]
  "Velocity": [3]
  "Gamma": [4]
  "Psi": [5]

plotting.state_traj_groups:
  "long_lat_alt": [1, 2, 0]
  "long_lat": [1, 2]