# ===============================
# MODEL CONFIGURATION
# ===============================

# state vector definition
state.r:
    idx: [0]
    units: d
  
state.theta:
    idx: [1]
    units: deg
  
state.phi:
    idx: [2]
    units: deg
  
state.v:
    idx: [3]
    units: v
  
state.gamma:
    idx: [4]
    units: deg
  
state.psi:
    idx: [5]
    units: deg

# control vector definition
control.bank:
    idx: [0]
    units: deg

control.aoa:
    idx: [1]
    units: deg

# ===============================
# CONSTRAINT MODELS
# ===============================

constraints.dynamics:
  type: dynamics
  fcn: trajopt/library/models/reentry_3dof.py:dynamics

constraints.initial_state:
  type: equality_bc
  set: state
  boundary: init

constraints.initial_control:
  type: equality_bc
  set: control
  boundary: init

constraints.final_state:
  type: equality_bc
  set: state
  boundary: final

constraints.final_bank_angle:
  type: equality_bc
  set: control
  value: null
  idx: null
  boundary: final

constraints.state_limits:
  type: box
  set: state
  min_value: []
  min_value_idx: []
  max_value: []
  max_value_idx: []

constraints.control_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_limit:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_aoa_angle_limits:
  type: box
  set: control
  min_value: null
  min_value_idx: null
  max_value: null
  max_value_idx: null

constraints.bank_angle_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.bank_aoa_rate_limit:
  type: control_rate_limit
  value: null
  idx: null

constraints.max_Q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:heat_rate
  max_val: null
  eps: null
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_q:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:dynamic_pressure
  max_val: null
  eps: null
  units: [{none: 1}]
  dimension: 1
  ct: 0

constraints.max_load:
  type: nonconvex_inequality
  group: path
  fcn: trajopt/library/models/reentry_3dof.py:aero_load
  max_val: null
  eps: null
  units: [{none: 1}]
  dimension: 1
  ct: 0

# ===============================
# COST MODELS
# ===============================

costs.min_time:
  type: min_time

costs.min_terminal_velocity:
  type: terminal_state
  value: null
  idx: [3]

costs.min_max_heat_rate:
    type: nonconvex
    minimax: 1
    fcn: trajopt/library/models/reentry_3dof.py:heat_rate
    units: [{none: 1}]
    ct: 0

trajectories:
  long_lat_trajectory_plot:
    type: general
    fcn: trajopt/library/models/reentry_3dof.py:long_lat
    group: state_trajplots
  
  long_lat_alt_trajectory_plot:
    type : general
    fcn: trajopt/library/models/reentry_3dof.py:long_lat_alt
    group: state_trajplots