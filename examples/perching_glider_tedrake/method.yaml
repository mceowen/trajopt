inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 20

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  free_final_time: 1
  

guess:
  type: propagation
  T_init: 0.8
  T_min:  0.5
  T_max:  1.5
  dT_max: 0.1

  nl_guess_u_start: [0]
  nl_guess_u_stop:  [0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.005
  eps_dyn:    0.00001
  eps_defect: 1.0
  eps_cost:   1

solver_opts:
  solver: CLARABEL