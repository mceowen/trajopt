# source: https://underactuated.mit.edu/trajopt.html#perching

params:
  Sw: 0.0885  # surface area of wing + fuselage + tail.
  Se: 0.0147  # surface area of elevator.
  lw: 0  # horizontal offset of wing center.
  le: 0.022  # elevator aerodynamic center from hinge.
  # self.lh = 0.317  # elevator hinge.
  lh: 0.27  # elevator hinge.
  inertia: 0.0015  # body inertia.
  m: 0.08  # body mass.
  rho: 1.204  # air density (kg/m^3).
  g: 9.81  # gravity

constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics
  
  initial_state:
    type: initial_state
    value: [-3.5, 0.1, 0, 0, 7.0, 0, 0]
  
  final_state:
    type: final_state
    value: [0, 0, null, null, null, null, null]

  state_limits:
    type: state_limits
    lower: [null, null, -0.9473, null, null, null, null]
    upper: [null, null, 0.4463, null, null, null, null]

  terminal_box:
    type: nonconvex_inequality
    fcn: fcns.terminal_box
    nodes: [-1]
    lower: [-2.0, -2.0, -1.0]
    upper: [2.0, 2.0, "${-np.pi / 6.0}"]

costs:
  u_squared:
    type: running
    fcn: fcns.u_squared_cost
    w: 100

constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - terminal_box

cost_list:
  - u_squared