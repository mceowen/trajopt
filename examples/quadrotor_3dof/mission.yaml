# ===============================
# FUNCTIONS
# ===============================
# no shared functions for this example

# ===============================
# FUNCTION PARAMETERS
# ===============================
params.planet.inherit: trajopt/library/missions/shared/planet/earth.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/quadrotor.yaml

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================
constraints:
  dynamics:
    type: dynamics
    fcn: trajopt/library/models/quadrotor_3dof.py:dynamics_jax
  
  initial_state:
    type: equality_bc
    set: state
    boundary: init
    value: [0.0, 0.0, 5.0, 0, 0.5, 0.0]
    idx: [0, 1, 2, 3, 4, 5]
  
  state_limits:
    type: box
    set: state
    min_value: [-0.5, -0.5, 0.25]
    min_value_idx: [0, 1, 2]
    max_value: [12.0, 12.0, 10.0]
    max_value_idx: [0, 1, 2]

  final_state:
    type: equality_bc
    set: state
    boundary: final
    value: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    idx: [0, 1, 2, 3, 4, 5]
    value_guess: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    eps: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
  
  initial_control:
    type: equality_bc
    set: control
    boundary: init
    value: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    idx: [0, 1, 2]

  final_control:
    type: equality_bc
    set: control
    boundary: final
    value: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    idx: [0, 1, 2]
  
  control_rate_limit:
    type: control_rate_limit
    value: [5.0, 5.0, 5.0]
    idx: [0, 1, 2]

  max_thrust:
    type: max_norm_cone
    set: control
    idx: [0, 1, 2]
    max_value: 8.12

  min_thrust:
    type: nonconvex_inequality
    group: path
    fcn: trajopt/library/models/quadrotor_3dof.py:thrust_norm
    min_value: 0.21
    eps: [0.01]
    units: [{f: 1}]
    dimension: 1
    ct: 0

  obstacle:
    type: nonconvex_inequality
    group: path
    fcn: trajopt/library/models/quadrotor_3dof.py:obstacle
    min_value: 4.0
    eps: [0.1]
    units: [{d: 1}]
    dimension: 1
    # ct: 1

costs:
  min_time:
    type: min_time

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list:
  - dynamics
  - initial_state
  - state_limits
  - final_state
  - initial_control
  - final_control
  - control_rate_limit
  - max_thrust
  - min_thrust
  - obstacle

cost_list:
  - min_time