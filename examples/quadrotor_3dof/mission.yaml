# ===============================
# FUNCTIONS
# ===============================
# no shared functions for this example

# ===============================
# FUNCTION PARAMETERS
# ===============================
params.planet.inherit: trajopt/library/missions/shared/planet/earth.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/quadrotor.yaml

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================

constraints:
  dynamics:
    type: dynamics
    fcn: trajopt/library/models/quadrotor_3dof.py:dynamics_jax
  
  initial_state:
    type: equality_bc
    set: state
    boundary: init
    x: [0.0, 0.0, 5.0, 0, 0.5, 0.0]
    x_idx: [0, 1, 2, 3, 4, 5]
  
  state_limits:
    type: box
    set: state
    x_min: [-0.5, -0.5, 0.25]
    x_min_idx: [0, 1, 2]
    x_max: [12.0, 12.0, 10.0]
    x_max_idx: [0, 1, 2]

  final_state:
    type: equality_bc
    set: state
    boundary: final
    x: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    x_idx: [0, 1, 2, 3, 4, 5]
    x_guess: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    eps: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
  
  initial_control:
    type: equality_bc
    set: control
    boundary: init
    x: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    x_idx: [0, 1, 2]

  final_control:
    type: equality_bc
    set: control
    boundary: final
    x: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    x_idx: [0, 1, 2]
  
  control_rate_limit:
    type: control_rate_limit
    udot_max: [5.0, 5.0, 5.0]
    udot_max_idx: [0, 1, 2]

  max_thrust:
    type: max_norm_cone
    set: control
    x_idx: [0, 1, 2]
    max_val: 8.12

  min_thrust:
    type: nonconvex_inequality
    group: path
    fcn: trajopt/library/models/quadrotor_3dof.py:thrust_norm
    min_val: 0.21
    eps: [0.01]
    units: [{f: 1}]
    dimension: 1
    ct: 0

costs:
  min_time:
    type: min_time

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list:
  - dynamics
  - initial_state
  - state_limits
  - final_state
  - initial_control
  - final_control
  - control_rate_limit
  - max_thrust
  - min_thrust

cost_list:
  - min_time