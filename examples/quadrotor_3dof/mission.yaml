# ===============================
# FUNCTION REGISTRY
# ===============================
fcns:
  thrust_norm: trajopt/models/quadrotor_3dof.py:thrust_norm
  obstacle:    trajopt/models/quadrotor_3dof.py:obstacle
  max_thrust_cone: trajopt/models/quadrotor_3dof.py:max_thrust_cone
  height:      trajopt/models/quadrotor_3dof.py:height
  pos_x:       trajopt/models/quadrotor_3dof.py:pos_x
  pos_y:       trajopt/models/quadrotor_3dof.py:pos_y
  xz:          trajopt/models/quadrotor_3dof.py:xz
  yz:          trajopt/models/quadrotor_3dof.py:yz

# ===============================
# PARAMETERS
# ===============================
params:
  planet:
    inherit: trajopt/missions/configs/planets/earth.yaml
  vehicle:
    inherit: trajopt/missions/configs/vehicles/quadrotor.yaml

# ===============================
# CONSTRAINTS
# ===============================
constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics

  initial_state:
    type: initial_state
    value: [0.0, 0.0, 5.0, 0.0, 0.5, 0.0]

  final_state:
    type: final_state
    value: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    value_guess: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    eps: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]

  max_thrust:
    type: convex_inequality
    fcn: fcns.max_thrust_cone
    dimension: 1
    scale: [1.0]

  min_thrust:
    type: nonconvex_inequality
    fcn: fcns.thrust_norm
    lower: "${params.vehicle.T_min}"
    dimension: 1
    scale: [1.0]

  obstacle:
    type: nonconvex_inequality
    fcn: fcns.obstacle
    lower: 4.0
    dimension: 1
    scale: [4.0]

  final_time:
    type: final_time
    lower: 1.0
    upper: 10.0

# ===============================
# COSTS
# ===============================
costs:
  min_time:
    type: min_time

# ===============================
# TRAJECTORIES
# ===============================
trajectories:
  xz:
    type: spatial
    fcn: fcns.xz
    group: stc_check

  yz:
    type: spatial
    fcn: fcns.yz
    group: stc_check

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================
constraint_list:
  - dynamics
  - initial_state
  - final_state
  - max_thrust
  - min_thrust
  - obstacle
  - final_time

cost_list:
  - min_time
