# ===============================
# FUNCTIONS
# ===============================
fcns.thrust_norm: trajopt/library/models/quadrotor_3dof.py:thrust_norm
fcns.obstacle: trajopt/library/models/quadrotor_3dof.py:obstacle
fcns.dynamics: trajopt/library/models/quadrotor_3dof.py:dynamics_jax
fcns.height: trajopt/library/models/quadrotor_3dof.py:height
fcns.pos_x: trajopt/library/models/quadrotor_3dof.py:pos_x
fcns.pos_y: trajopt/library/models/quadrotor_3dof.py:pos_y

fcns.xz: trajopt/library/models/quadrotor_3dof.py:xz
fcns.yz: trajopt/library/models/quadrotor_3dof.py:yz

# ===============================
# FUNCTION PARAMETERS
# ===============================
params.planet.inherit: trajopt/library/missions/shared/planet/earth.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/quadrotor.yaml

state.pos.scale: 1.0
state.vel.scale: 1.0
control.thrust.scale: 1.0
time.scale: 1.0

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================
constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics
  
  initial_state:
    type: equality_bc
    set: state
    boundary: init
    value: [0.0, 0.0, 5.0, 0, 0.5, 0.0]
    idx: [0, 1, 2, 3, 4, 5]
  
  state_limits:
    type: box
    set: state
    min_value: [-0.5, -0.5, 0.25]
    min_value_idx: [0, 1, 2]
    max_value: [12.0, 12.0, 10.0]
    max_value_idx: [0, 1, 2]

  final_state:
    type: equality_bc
    set: state
    boundary: final
    value: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    idx: [0, 1, 2, 3, 4, 5]
    value_guess: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    eps: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
  
  initial_control:
    type: equality_bc
    set: control
    boundary: init
    value: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    idx: [0, 1, 2]

  final_control:
    type: equality_bc
    set: control
    boundary: final
    value: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    idx: [0, 1, 2]
  
  control_rate_limit:
    type: control_rate_limit
    value: [4.0, 4.0, 4.0]
    idx: [0, 1, 2]

  max_thrust:
    type: max_norm_cone
    set: control
    idx: [0, 1, 2]
    max_value: 8.12

  min_thrust:
    type: nonconvex_inequality
    group: path
    fcn: fcns.thrust_norm
    min_value: 0.21
    eps: [0.01]
    dimension: 1
    # ct: 0

  obstacle:
    type: nonconvex_inequality
    group: path
    fcn: "fcns.obstacle"
    min_value: 4.0
    eps: [0.1]
    dimension: 1
    #ct: 1

  low_height_stc:
    type: nonconvex_inequality
    group: path
    fcn: "((fcns.pos_x >= 5.0) and (fcns.pos_y >= 5.0)) implies (fcns.height <= 1.0)"
    eps: [0.1]
    scale: [1.0]
    dimension: 1

  

costs:
  min_time:
    type: min_time

trajectories:
  xz:
    type: spatial
    fcn: fcns.xz
    group: stc_check

  yz:
    type: spatial
    fcn: fcns.yz
    group: stc_check



# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list:
  - dynamics
  - initial_state
  - state_limits
  - final_state
  - initial_control
  - final_control
  - control_rate_limit
  - max_thrust
  - min_thrust
  - obstacle
  #- low_height_stc

cost_list:
  - min_time