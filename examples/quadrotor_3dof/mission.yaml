# ===============================
# FUNCTION REGISTRY
# ===============================
fcns:
  thrust_norm: trajopt/models/quadrotor_3dof.py:thrust_norm
  obstacle:    trajopt/models/quadrotor_3dof.py:obstacle
  dynamics:    trajopt/models/quadrotor_3dof.py:dynamics_jax
  height:      trajopt/models/quadrotor_3dof.py:height
  pos_x:       trajopt/models/quadrotor_3dof.py:pos_x
  pos_y:       trajopt/models/quadrotor_3dof.py:pos_y
  xz:          trajopt/models/quadrotor_3dof.py:xz
  yz:          trajopt/models/quadrotor_3dof.py:yz

# ===============================
# PARAMETERS
# ===============================
params:
  planet:
    inherit: trajopt/missions/planets/earth.yaml
  vehicle:
    inherit: trajopt/missions/vehicles/quadrotor.yaml

# ===============================
# SCALING
# ===============================
state:
  x.scale:  1.0
  y.scale:  1.0
  z.scale:  1.0
  vx.scale: 1.0
  vy.scale: 1.0
  vz.scale: 1.0

control:
  Tx.scale: 1.0
  Ty.scale: 1.0
  Tz.scale: 1.0

time:
  scale: 1.0

# ===============================
# CONSTRAINTS
# ===============================
constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics

  initial_state:
    type: equality_bc
    set: state
    boundary: init
    value: [0.0, 0.0, 5.0, 0, 0.5, 0.0]
    idx: [0, 1, 2, 3, 4, 5]

  final_state:
    type: equality_bc
    set: state
    boundary: final
    value: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    idx: [0, 1, 2, 3, 4, 5]
    value_guess: [10.0, 10.0, 0.5, 0.0, 0.0, 0.0]
    eps: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]

  state_limits:
    type: box
    set: state
    min_value: [-0.5, -0.5, 0.25]
    min_value_idx: [0, 1, 2]
    max_value: [12.0, 12.0, 10.0]
    max_value_idx: [0, 1, 2]

  initial_control:
    type: equality_bc
    set: control
    boundary: init
    value: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    idx: [0, 1, 2]

  final_control:
    type: equality_bc
    set: control
    boundary: final
    value: [0.0, 0.0, "${params.planet.g * params.vehicle.mass}"]
    idx: [0, 1, 2]

  control_rate_limit:
    type: control_rate_limit
    value: [3.0, 3.0, 3.0]
    idx: [0, 1, 2]

  max_thrust:
    type: max_norm_cone
    set: control
    idx: [0, 1, 2]
    max_value: 8.12

  min_thrust:
    type: nonconvex_inequality
    group: path
    fcn: fcns.thrust_norm
    min_value: 0.21

  obstacle:
    type: nonconvex_inequality
    group: path
    fcn: fcns.obstacle
    min_value: 4.0

  low_height_stc:
    type: nonconvex_inequality
    group: path
    fcn: "((fcns.pos_x >= 5.0) and (fcns.pos_y >= 5.0)) implies (fcns.height <= 1.0)"

# ===============================
# COSTS
# ===============================
costs:
  min_time:
    type: min_time

# ===============================
# TRAJECTORIES
# ===============================
trajectories:
  xz:
    type: spatial
    fcn: fcns.xz
    group: stc_check

  yz:
    type: spatial
    fcn: fcns.yz
    group: stc_check

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================
constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - initial_control
  - final_control
  - control_rate_limit
  - max_thrust
  - min_thrust
  - obstacle
  # - low_height_stc

cost_list:
  - min_time
