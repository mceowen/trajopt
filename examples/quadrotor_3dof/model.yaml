# Dimensional model configuration (no nondim)
module_path: "trajopt.core.model.quadrotor_3dof"

# State/control dimensions
n: 6
m: 3

# index of x and y in the state vector for obstacle constraints
obs:
  x_idx: 0
  y_idx: 1

# z_types is the unit type of each state variable
# (options: distance, time, mass, velocity, acceleration, force, angle, angular velocity)
# same for u_types
z_types: ["d", "d", "d", "v", "v", "v"]
u_types: ["f", "f", "f"]

# anchor types are the unit types of the anchor scales used to determine all other nondim scales
# same options as z_types and u_types, three independent scales are needed to fully determine the rest
anchor_types : ["d", "v", "m"]
anchor_scales: [10.0, 10.0, 1.0]

# base units for (distance, time, mass) in that order, used to label nondimensional scales
base_unit_labels: ["m", "s", "kg"]

custom_modules:
  dynamics: trajopt.examples.quadrotor_3dof.custom.dynamics2

# list of constraints (apart basic state and control constraints, and dynamics)
constraints:
- fcn: "trajopt.core.model.obstacles.nfz_nonlinear"
  analytical_affine_approximation: "trajopt.core.model.obstacles.nfz_analytical_affine_approximation"
  type: "inequality"
  convex: 0
  auto_diff: 1
  jax: 1
  always: 0
  dimension: 6
  category: "nfz"