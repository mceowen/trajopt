inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 30

# ===============================
# FLAGS
# ===============================
flags:
  equal_dt: 1
  zoh_dilation: 1
  free_final_time: 1

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  type: straight_line
  t_start: 0.0
  t_stop: 3.0

  u_start: "${(np.array([0, 0, params.planet.g]) * params.vehicle.mass) + np.array([0.08, 0.08, 0.0])}"
  u_stop: "${(np.array([0, 0, params.planet.g]) * params.vehicle.mass) + np.array([0.08, 0.08, 0.0])}"

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state: 0.001
  eps_cost:  0.0001
  eps_dyn:   0.001
  iter_max:  100

# ===============================
# SOLVER OPTIONS
# ===============================
solver_opts:
  solver: CLARABEL
