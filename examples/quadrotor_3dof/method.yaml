inherit: trajopt/library/methods/configs/autoscvx.yaml

time_grid: 20

constraints:
  obstacle:
    eps: [0.01]
    # ct: 1
  low_height_stc:
    eps: [0.1]
    scale: [1.0]

guess:
  type: propagation
  T_init:   7.0
  T_min:    1.0
  T_max:    15.0
  dT_max:   0.1

  nl_guess_u_start: "${(np.array([0, 0, params.planet.g]) * params.vehicle.mass) + np.array([0.08, 0.08, 0.0])}"
  nl_guess_u_stop:  "${(np.array([0, 0, params.planet.g]) * params.vehicle.mass) + np.array([0.08, 0.08, 0.0])}"

  line_guess_u_init: "${np.tile(np.array([0, 0, params.planet.g]) * params.vehicle.mass, (time_grid, 1))}"

conv:
  eps_state: 0.01
  eps_dyn: 0.000001