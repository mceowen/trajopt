inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 40

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  free_final_time: 0
  flag_conv: 1

guess:
  type: straight_line
  T_init: 4.0
  T_min:  0.1
  T_max:  5.0
  dT_max: 0.1

  nl_guess_u_start: [0.1, 0]
  nl_guess_u_stop:  [0.1, 0]
  
  line_guess_u_init: "${np.tile([0.1, 0.0], (time_grid, 1))}"

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.01
  eps_dyn:    0.00001
  eps_defect: 1.0
  eps_cost:   1

solver_opts:
  solver: CLARABEL