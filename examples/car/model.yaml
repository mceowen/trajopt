fcns:
  dynamics: car.py:dynamics
  obstacle: car.py:obstacle
  u_squared_cost: car.py:u_squared_cost
  x1x2: car.py:x1x2
  body_dir: car.py:body_dir
  obstacle_circles: car.py:obstacle_circles

state:
  x1:
    idx: [0]
    scale: 1
  x2:
    idx: [1]
    scale: 1
  theta:
    idx: [2]
    scale: 1

control:
  v:
    idx: [0]
    scale: 1
  w:
    idx: [1]
    scale: 1

time: 
  scale: 1

trajectories:
  x1x2:
    type: spatial
    fcn: fcns.x1x2
    equal_aspect: true
    xlim: [-1, 1]
    
    quivers:
      
      body:
        fcn: fcns.body_dir
        scale: 0.08
        color: [0, 0, 0]
        alpha: 0.8
        linewidth: 2.0
        centered: true
    
    overlays:
      obstacle:
        fcn: fcns.obstacle_circles
        color: [0.8, 0.0, 0.0]
        ls: "-"
        lw: 1.5
        alpha: 0.7
  
  x1x2_timeseries:
    type: time_series
    fcn: fcns.x1x2
    title: "x1, x2 vs Time"
    xlabel: "Time (s)"
    ylabel: "Position"