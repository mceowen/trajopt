# model yaml for lander_6dof model

inherit: trajopt/library/models/lander_6dof.yaml

dimensions:
  n: 14
  m: 3

nondim:
  z_types: ["m", "d", "d", "d", "v", "v", "v", "none", "none", "none", "none", "none", "none", "none"]
  u_types: ["f", "f", "f"]

  anchor_types : ["d", "t", "m"]
  anchor_scales: [1.0, 1.0, 1.0]

constraint_models:

### NEW
# - type: AFFINE
#   name: 'affine1'
# - type: POLYTOPE
#   name: 'affine1'
# - type: SOC
#   name: 'affine1'

- type: BOX
  name: box_out
  group: path
  idx: [1,2,3]
  upper: precompute- custom.py:upper_out
  lower: precompute- custom.py:lower_out
  version: 'out'
  ## just for plotting 
  affine2vertices: precompute- custom.py:affine2vertices
  vertices2edges: precompute- custom.py:vertices2edges
  vertices2faces: precompute- custom.py:vertices2faces                  


- type: BOX
  name: box_in_convex
  group: path
  idx: [1,2,3]
  upper: precompute- custom.py:upper_in_convex
  lower: precompute- custom.py:lower_in_convex
  version: 'in_convex'
  ## just for plotting 
  affine2vertices: precompute- custom.py:affine2vertices
  vertices2edges: precompute- custom.py:vertices2edges
  vertices2faces: precompute- custom.py:vertices2faces

- type: BOX
  name: box_in_buffer
  group: path
  idx: [1,2,3]
  upper: precompute- custom.py:upper_in_buffer
  lower: precompute- custom.py:lower_in_buffer
  version: 'in_buffer'
  ## just for plotting 
  affine2vertices: precompute- custom.py:affine2vertices
  vertices2edges: precompute- custom.py:vertices2edges
  vertices2faces: precompute- custom.py:vertices2faces
  


# - type: UPPER
# - type: LOWER

# - type: SPHERE
# - type: ELLIPSOID
# - type: CYLINDER
# - type: CONE



### OLD
- type: dynamics
  name: dynamics
  fcn: trajopt/library/models/lander_6dof.py:dynamics

- type: equality_bc
  name: initial_state
  set: state
  boundary: init

- type: equality_bc
  name: final_state
  set: state
  x: null
  x_idx: null
  boundary: final

- type: equality_bc
  name: final_control
  set: control
  x: null
  x_idx: null
  boundary: final

- type: box
  name: state_limits
  set: state
  x_min: null
  x_min_idx: null
  x_max: null
  x_max_idx: null

- type: axis_angle_cone
  name: gimbal_limit
  set: control
  axis: [1, 0, 0]
  theta_max: null # loaded in mission
  x_idx: [0, 1, 2]

- type: axis_angle_cone
  name: glide_slope
  set: state
  axis: [1, 0, 0]
  theta_max: null
  x_idx: [1, 2, 3]

- type: max_norm_cone
  name: max_thrust
  set: control
  max_val: null
  x_idx: [0, 1, 2]

- type: max_norm_cone
  name: max_angular_velocity
  set: state
  max_val: null
  x_idx: [11, 12, 13]

- type: quaternion_cone
  name: tilt_limit
  theta_max: null
  axis_num: 1
  quat_start_idx: 7

- type: nonconvex_inequality
  name: height_triggered_pitch
  group: path
  fcn: trajopt/library/models/lander_6dof.py:height_triggered_pitch
  eps: null
  units: null
  dimension: 1
  ct: 0

- type: nonconvex_inequality
  name: min_thrust_norm
  group: path
  fcn: trajopt/library/models/lander_6dof.py:min_thrust_norm
  eps: null
  units: [{"f": 1}]
  dimension: 1
  ct: 0

cost_models:
- type: min_time
  name: min_time

- type: control_effort
  name: control_effort
  x_idx: [0, 1, 2]