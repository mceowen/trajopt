# source: https://underactuated.mit.edu/acrobot.html#cart_pole

params:
  g: 9.81
  mp: 0.3
  mc: 1
  l: 0.5

constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics
  
  initial_state:
    type: initial_state
    value: [0, 0, 0, 0]
  
  final_state:
    type: final_state
    value: [1, "${np.pi}", 0, 0]

  state_limits:
    type: state_limits
    lower: [-4, null, null, null]
    upper: [ 4, null, null, null]

  control_limits:
    type: control_limits
    lower: [-20]
    upper: [20]

costs:
  min_time:
    type: min_time

  u_squared:
    type: running
    fcn: fcns.u_squared_cost
    w: 1.0

constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - control_limits

cost_list:
  - min_time
  # - u_squared