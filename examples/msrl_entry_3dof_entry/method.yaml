# INHERIT THE AUTOSCVX METHOD CONFIGS
inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ==============================
time_grid: 100

# ===============================
# INITIAL GUESS SETTINGS
# ==============================
guess:
  T_init: 200.0
  T_min: 110.0
  T_max: 1000.0
  dT_max: 50.0

  nl_guess_u_start: [120.0, 0.0]
  nl_guess_u_stop: [0, 0.0]

flags:
  equal_dt: 1
  zoh_dilation: 1
  free_final_time: 1

# ===============================
# CONVERGENCE TOLERANCES
# ==============================
conv:
  eps_state: [500, 0.05, 0.05, 50, 0.05, 0.05]
  eps_cost: 1
  eps_defect: [0.01]
  eps_dyn: [10.0, 0.1, 0.1, 10.0, 0.1, 0.1]
  iter_max: 200

solver_opts:
  solver: CLARABEL
