inherit: trajopt/methods/configs/autoscvx.yaml
# inherit: trajopt/methods/configs/autoscvx-ps.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 40

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  zoh_dilation: 1
  free_final_time: 0

guess:
  type: straight_line
  T_init: 6.0
  T_min:  3
  T_max:  10
  dT_max: 5.0

  nl_guess_u_start: [2.0, 0, 0]
  nl_guess_u_stop:  [2.0, 0, 0]

  line_guess_u_init: "${np.tile([2.0, 0.5, 0], (time_grid, 1))}"

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.00001
  eps_dyn:    0.00001
  eps_defect: 1.0
  eps_cost:   1

# ===============================
# SOLVER OPTIONS
# ===============================
solver_opts:
  solver: CLARABEL
