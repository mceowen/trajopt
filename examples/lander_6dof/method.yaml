inherit: trajopt/methods/configs/autoscvx-ps.yaml

time_grid: 20

guess:
  type: straight_line
  # time initialization
  T_init: 5
  T_min: 0.01
  T_max: 10
  dT_max: 0.5 # 5.0

  # control initialization for nonlinear initial guess
  nl_guess_u_start: [2.0, 0, 0]
  nl_guess_u_stop: [2.0, 0, 0]

  # control initialization for straight line initial guess
  line_guess_u_init: "${np.tile([2.0, 0.5, 0], (time_grid, 1))}"

conv:
  eps_state: 0.0001
  eps_dyn: 0.00001
  eps_defect: 1.0
  eps_cost: 1