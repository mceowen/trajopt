inherit: trajopt/methods/configs/autoscvx.yaml
# inherit: trajopt/methods/configs/autoscvx-ps.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 40

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  zoh_dilation: 1
  free_final_time: 0

guess:
  type: straight_line
  t_start: 0.0
  t_stop: 10.0

  u_start: [2.0, 0, 0]
  u_stop: [2.0, 0, 0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.00001
  eps_dyn:    0.00001
  eps_defect: 1.0
  eps_cost:   1

# ===============================
# SOLVER OPTIONS
# ===============================
solver_opts:
  solver: CLARABEL
