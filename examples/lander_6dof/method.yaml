inherit: trajopt/library/methods/configs/autoscvx.yaml

N: 40

guess:
  type: straight_line
  # time initialization
  T_init: 5
  T_min: 1
  T_max: 10
  dT_max: 0.5 # 5.0

  # control initialization for nonlinear initial guess
  nl_guess_u_start: [2.0, 0, 0]
  nl_guess_u_stop: [2.0, 0, 0]

  # control initialization for straight line initial guess
  line_guess_u_init: "${np.tile([2.0, 0.5, 0], (N, 1))}"

conv:
  #ctcs_mult_state: 1.0
  ctcs_fac_cnst: 0.5
  eps_ctcs: 1e-8
  eps_state: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
  eps_cost: 1
  eps_defect: [1]
  eps_dyn: [0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001, 0.000001]
  iter_max: 50

flags:
  ignore_dpp: 1
  flag_conv: 1
  buff_dyn: "quad-2"
  buff_dyn_dual: l1

solver_opts:
  solver: "ECOS"