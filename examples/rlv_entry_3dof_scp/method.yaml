inherit: trajopt/methods/configs/autoscvx-term.yaml
# inherit: trajopt/methods/configs/autoscvx-term-fixed-dual.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 150

# ===============================
# FLAGS
# ===============================
flags:
  ode_fixed_dt: 1
  equal_dt: 1
  free_final_time: 1
  flag_conv: 1

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  T_init: 2000.0
  T_min: 1.0
  T_max: 3000.0
  dT_max: 10.0

  nl_guess_u_start: [17.4, -45.0]
  nl_guess_u_stop: [17.4, -45.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state: [10, 0.001, 0.001, 50, 0.0001, 0.0001]
  eps_cost: 1
  eps_defect: [0.01]
  eps_dyn: [100.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 300

solver_opts:
  solver: CLARABEL
