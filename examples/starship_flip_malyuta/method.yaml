inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 40

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  free_final_time: 0
  zoh_dilation: 1
  flag_conv: 1

guess:
  type: straight_line
  T_init: 20
  T_min:  5
  T_max:  30
  dT_max: 3

  nl_guess_u_start: [500000, 0]
  nl_guess_u_stop:  [500000, 0]
  
  line_guess_u_init: "${np.tile([3 * 880000, 0.0], (time_grid, 1))}"

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.00001
  eps_dyn:    0.00001
  eps_defect: 1.0
  eps_cost:   1
  iter_max: 100

solver_opts:
  solver: CLARABEL