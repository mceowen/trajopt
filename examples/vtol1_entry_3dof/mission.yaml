# ===============================
# FUNCTIONS
# ===============================
fcns.nonlinear_aero: trajopt/missions/vtol.py:nonlinear_aero_jax

# ===============================
# FUNCTION PARAMETERS
# ===============================

params.planet.inherit: trajopt/missions/shared/planet/earth.yaml
params.vehicle.inherit: trajopt/missions/shared/vehicle/vtol.yaml

# ===============================
# PROBLEM SCALES
# ===============================

state.r.scale: 1000000
state.theta.scale: 1
state.phi.scale: 1
state.v.scale: 1000
state.gamma.scale: 1
state.psi.scale: 1

control.bank.scale: 1
time.scale: 1.0

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================

constraints:
  initial_state:
    value: ["${params.planet.r + 100e3}", 0.0, 0.0, 7450, -0.5, 0.0]
    idx: [0, 1, 2, 3, 4, 5]

  final_state:
    value: ["${params.planet.r + 15e3}", 12, 70, -10, 90]
    idx: [0, 1, 2, 4, 5]
    eps: [500, 0.001, 0.001, 0.001, 0.001]

  state_limits:
    min_value: ["${params.planet.r}", 100.0]
    min_value_idx: [0, 3]

  bank_angle_limit:
    min_value: [-80.0]
    min_value_idx: [0]
    max_value: [80.0]
    max_value_idx: [0]

  bank_angle_rate_limit:
    value: [10]
    idx: [0]
  
  max_Q:
    max_value: 33300
    scale: [33300]
    eps: [0.01]
  
  max_q:
    max_value: 18000
    # ct: 1
    scale: [18000]
    eps: [0.01]
  
  max_load:
    max_value: 24.525
    # ct: 1
    scale: [24.525]
    eps: [0.01]

costs:
  control_rate_regularization:
    type: rate_regularization
    set: control
    w: 0.1

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - bank_angle_limit
  # - bank_angle_rate_limit
  - max_Q
  - max_q
  - max_load

cost_list: 
  - min_terminal_velocity
  - control_rate_regularization

trajectories:
  heat_rate:
    upper_limit: 3.33
  
  dynamic_pressure:
    upper_limit: 18.0
  
  aero_load:
    upper_limit: "${24.525 / 9.81}"
