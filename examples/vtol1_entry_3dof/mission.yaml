# ===============================
# FUNCTIONS
# ===============================

fcns.density_model: trajopt/library/missions/vtol.py:exp_density_jax
fcns.nonlinear_aero: trajopt/library/missions/vtol.py:nonlinear_aero_jax

# ===============================
# FUNCTION PARAMETERS
# ===============================

params.planet.inherit: trajopt/library/missions/shared/planet/earth.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/vtol.yaml

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================

constraints:
  initial_state:
    value: ["${params.planet.r + 100e3}", 0.0, 0.0, 7450, -0.5, 0.0]
    idx: [0, 1, 2, 3, 4, 5]

  final_state:
    value: ["${params.planet.r + 15e3}", 12, 70, -10, 90]
    idx: [0, 1, 2, 4, 5]
    eps: [300, 0.1, 0.1, 0.1, 0.1]

  state_limits:
    min_value: ["${params.planet.r}", 100.0]
    min_value_idx: [0, 3]

  bank_angle_limit:
    min_value: [-80.0]
    min_value_idx: [0]
    max_value: [80.0]
    max_value_idx: [0]

  bank_angle_rate_limit:
    value: [10]
    idx: [0]
  
  max_Q:
    max_value: 33300
    eps: [0.01]
  
  max_q:
    max_value: 18000
    min_value: 100
    eps: [0.01]
  
  max_load:
    max_value: 24.525
    eps: [0.01]

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list: 
  - initial_state
  - final_state
  - state_limits
  - bank_angle_limit
  - bank_angle_rate_limit
  - max_Q
  - max_q
  - max_load

cost_list: 
  - min_terminal_velocity
