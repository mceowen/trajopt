# ===============================
# MISSION PARAMS
# ===============================

planet:
  inherit: trajopt/library/missions/shared/planet/earth.yaml
vehicle:
  inherit: trajopt/library/missions/shared/vehicle/vtol.yaml

flags:
  flag_nfz: 0
  init_ctrl: 0
  final_ctrl: 0
  aero_type: 'exponential'  # 'exponential', 'jax_lookup', 'spline', 'none'

# ===============================
# MISSION FUNCTIONS
# ===============================

fcns:
  atmosphere_model_jax: trajopt/library/missions/vtol.py:atmosphere_model_jax
  atmosphere_model_nonjax: trajopt/library/missions/vtol.py:atmosphere_model_nonjax
  nonlinear_aero_jax: trajopt/library/missions/vtol.py:nonlinear_aero_jax
  nonlinear_aero_nonjax: trajopt/library/missions/vtol.py:nonlinear_aero_nonjax

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================

constraints:
- name: dynamics

- name: initial_state
  x: "eval: np.array([params['mission']['planet']['r'] + 100e3, 0.0, 0.0, 7450, -0.5, 0.0])"
  x_idx: [0, 1, 2, 3, 4, 5]

- name: final_state
  x: "eval: np.array([(params['mission']['planet']['r'] + 15e3), 12, 70, -10, 90])"
  x_idx: [0, 1, 2, 4, 5]
  eps: [100, 0.1, 0.1, 0.1, 0.1]

- name: state_limits
  x_min: "eval: np.array([params['mission']['planet']['r'], 100.0])"
  x_min_idx: [0, 3]
  x_max: []
  x_max_idx: []

- name: bank_angle_limit
  x_min: [-80.0]
  x_min_idx: [0]
  x_max: [80.0]
  x_max_idx: [0]

- name: bank_angle_rate_limit
  udot_max: [10]
  udot_max_idx: [0]

- name: max_Q
  max_val: 33300
  eps: [100]

- name: max_q
  max_val: 18000
  eps: [180]

- name: max_load
  max_val: 24.525
  eps: [0.01]

# - name: keepout_zones
#   xc: [5,-6.5]
#   yc: [30,50]
#   rc: [5,5]

costs:
- name: min_terminal_velocity