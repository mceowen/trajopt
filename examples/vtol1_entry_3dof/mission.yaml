# ===============================
# FUNCTION REGISTRY
# ===============================
fcns:
  nonlinear_aero: trajopt/missions/vtol.py:nonlinear_aero_jax

# ===============================
# PARAMETERS
# ===============================
params:
  planet:
    inherit: trajopt/missions/configs/planets/earth.yaml
  vehicle:
    inherit: trajopt/missions/configs/vehicles/vtol.yaml

# ===============================
# CONSTRAINTS
# ===============================
constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics

  initial_state:
    type: initial_state
    value: ["${params.planet.r + 100e3}", 0.0, 0.0, 7450, -0.5, 0.0]

  final_state:
    type: final_state
    value: ["${params.planet.r + 15e3}", 12, 70, null, -10, 90]
    eps: [500, 0.001, 0.001, 0.001, 0.001]

  state_limits:
    type: state_limits
    lower: ["${params.planet.r}", null, null, 100.0, null, null]

  bank_angle_limit:
    type: control_limits
    lower: [-80.0, null]
    upper: [80.0, null]

  bank_angle_rate_limit:
    type: control_rate_limit
    value: [10]
    idx: [0]

  max_Q:
    type: nonconvex_inequality
    fcn: "fcns.heat_rate"
    upper: 3.3300
    scale: [3.3300]

  max_q:
    type: nonconvex_inequality
    fcn: fcns.dynamic_pressure
    upper: 18.000
    scale: [18.000]

  max_load:
    type: nonconvex_inequality
    fcn: fcns.aero_load
    upper: 2.5
    scale: [2.5]

  final_time:
    type: final_time
    lower: 550.0
    upper: 3000.0

# ===============================
# COSTS
# ===============================
costs:
  min_terminal_velocity:
    type: terminal
    fcn: fcns.velocity

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================
constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - bank_angle_limit
  - bank_angle_rate_limit
  - max_Q
  - max_q
  - max_load
  - final_time

cost_list:
  - min_terminal_velocity

# ===============================
# TRAJECTORIES
# ===============================

trajectories:
  heat_rate:
    upper_limit: 3.33

  dynamic_pressure:
    upper_limit: 18.0

  aero_load:
    upper_limitt: 2.5