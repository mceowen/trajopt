inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 100

flags:
  equal_dt: 1
  flag_conv: 1
  free_final_time: 1

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  T_init: 500.0
  T_min:  500.0
  T_max:  3000.0
  dT_max: 100.0

  nl_guess_u_start: [0.0, 0.0]
  nl_guess_u_stop:  [0.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state:  [500, 0.001, 0.001, 10, 0.001, 0.001]
  eps_cost:   1
  eps_defect: 0.1
  eps_dyn:    [500.0, 0.1, 0.1, 100.0, 0.1, 0.1]
  iter_max: 400

solver_opts:
  solver: CLARABEL