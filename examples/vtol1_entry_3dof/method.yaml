inherit: trajopt/library/methods/configs/autoscvx.yaml

N: 40

flags:
  equal_dt: 0
  buff_dyn: "term"
  ctcs: l2

# initial guess configuration
guess: 
  T_init: 1700
  T_min: 550.0
  T_max: 3000.0
  dT_max: 50.0
  nl_guess_u_start: [0.0, 0.0]
  nl_guess_u_stop: [0.0, 0.0]

# SCP convergence configuration
conv:
  eps_state: [500, 1, 1, 50, 1, 1]
  eps_cost: 1
  eps_defect: [0.01]
  eps_dyn: [100.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 200

weights:
  alpha_z: 0.05
  alpha_u: 0.05