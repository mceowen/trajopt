inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 150

# ===============================
# FLAGS
# ===============================
flags:
  ode_fixed_dt: 1
  equal_dt: 1
  free_final_time: 1
  flag_conv: 1

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  t_start: 0.0
  t_stop: 1000.0

  u_start: [-0.0, 10.0]
  u_stop: [-0.0, 10.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state:  [5, 0.0001, 0.0001, 5, 0.0001, 0.0001]
  eps_cost:   0.001
  eps_defect: [0.01]
  eps_dyn:    [100.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max:   400

# ===============================
# SOLVER OPTIONS
# ===============================
solver_opts:
  solver: QOCO
