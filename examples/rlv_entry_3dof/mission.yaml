# ===============================
# FUNCTION REGISTRY
# ===============================
fcns:
  nonlinear_aero: trajopt/missions/rlv_entry.py:nonlinear_aero

# ===============================
# PARAMETERS
# ===============================
params:
  planet:
    inherit: trajopt/missions/planets/earth.yaml
  vehicle:
    inherit: trajopt/missions/vehicles/rlv.yaml

# ===============================
# CONSTRAINTS
# ===============================
constraints:
  initial_state:
    value: ["${params.planet.r + 79248.0}", 0.0, 0.0, 7802.88, -1.0, 90.0]
    idx: [0, 1, 2, 3, 4, 5]

  final_state:
    value: ["${params.planet.r + 24384.0}", 762.0, -5.0]
    idx: [0, 3, 4]
    eps: [100, 10, 0.1]

  state_limits:
    min_value: ["${params.planet.r}", 500.0, -80.0]
    min_value_idx: [0, 3, 4]
    max_value: ["${params.planet.r + 79248.0}", 45000.0, 80.0]
    max_value_idx: [0, 3, 4]

  control_limits:
    min_value: [-90.0, 17.0]
    min_value_idx: [0, 1]
    max_value: [1.0, 17.5]
    max_value_idx: [0, 1]

# ===============================
# COSTS
# ===============================
costs:
  max_crossrange:
    type: terminal_state
    idx: [2]
    sign: -1

  control_rate_regularization:
    type: rate_regularization
    set: control
    w: 1.0

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================
constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - control_limits

cost_list:
  - max_crossrange
  - control_rate_regularization
