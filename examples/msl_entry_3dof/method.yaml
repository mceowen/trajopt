inherit: trajopt/methods/configs/autoscvx-term.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 50

# ===============================
# FLAGS
# ===============================
flags:
  equal_dt: 0
  ode_fixed_dt: 1
  free_final_time: 0

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  T_init: 280.0
  dT_max: 10.0

  nl_guess_u_start: [0.0, 0.0]
  nl_guess_u_stop:  [0.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state:  [500, 0.001, 0.001, 50, 0.001, 0.001]
  eps_cost:   1
  eps_defect: [0.01]
  eps_dyn:    [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max:   100

solver_opts:
  solver: CLARABEL
