inherit: trajopt/methods/configs/autoscvx.yaml
# inherit: trajopt/methods/configs/autoscvx-term-ps.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 20

# ===============================
# FLAGS
# ===============================
flags:
  ode_fixed_dt: 1
  equal_dt: 1
  free_final_time: 1
  flag_conv: 1
  ctcs: 0

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  T_init: 280.0
  dT_max: 10.0

  nl_guess_u_start: [0.0, 0.0]
  nl_guess_u_stop:  [0.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state:  [50, 0.1, 0.1, 5, 0.1, 0.1]
  eps_cost:   0.1
  eps_defect: [0.01]
  eps_dyn:    [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max:   100

solver_opts:
  solver: CLARABEL
