# INHERIT THE AUTOSCVX METHOD CONFIGS
inherit: trajopt/methods/configs/autoscvx-term.yaml

# ===============================
# GRID SETTINGS
# ==============================
time_grid: 50

flags:
  free_final_time: 0
  equal_dt: 0
  discretize: ps

# ===============================
# INITIAL GUESS SETTINGS
# ==============================
guess:
  T_init: 280.0
  T_min: 1.0
  T_max: 8000.0
  dT_max: 100.0

  nl_guess_u_start: [5.0, 0.0]
  nl_guess_u_stop: [5.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ==============================
conv:
  eps_state: [500, 0.001, 0.001, 50, 0.001, 0.001]
  eps_cost: 1
  eps_defect: [0.01]
  eps_dyn: [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 100

weights:
  alpha_z: 0.5
  alpha_u: 0.5

solver_opts:
  solver: CLARABEL
