# INHERIT THE AUTOSCVX METHOD CONFIGS
inherit: trajopt/library/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ==============================
time_grid: 40

# ===============================
# METHOD FLAGS
# ==============================
flags:
  buff_dyn: term    # 'term', 'l1', 'l2', 'quad-1', 'quad-2'
  buff_dyn_dual: none 
  flag_conv: 1

# ===============================
# INITIAL GUESS SETTINGS
# ==============================
guess:
  T_init: 300.0
  T_min: 180.0
  T_max: 400.0
  dT_max: 20.0

  nl_guess_u_start: [5.0, 0.0]
  nl_guess_u_stop: [5.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ==============================
conv:
  eps_state: [500, 1, 1, 50, 1, 1]
  eps_cost: 1
  eps_defect: [0.01]
  eps_dyn: [10.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max: 100

# ===============================
# CONSTRAINT CONFIGURATIONS
# ==============================
constraints:
  types: 
    nonconvex_inequality:
      W:
        penalty: True
        autotune: True
        init: 1.0
      dual: 
        penalty: True
        autotune: True
        init: 0.0
      
      vb: 'standard'
      eps: [0.01]
      ct: True
    
    dynamics:
      W:
        penalty: True
        autotune: True
        init: 1.0
      dual: 
        penalty: True
        autotune: True
        init: 0.0
      vb: 'standard'

  names: 
    final_state:
      W:
        penalty: True
        autotune: True
        init: 1.0
      dual: 
        penalty: True
        autotune: True
        init: 0.0
      vb: 'standard'