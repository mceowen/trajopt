# INHERIT THE AUTOSCVX METHOD CONFIGS
inherit: trajopt/library/methods/configs/autoscvx-term.yaml

# ===============================
# GRID SETTINGS
# ==============================
time_grid: 40

# ===============================
# INITIAL GUESS SETTINGS
# ==============================
guess:
  T_init: 300.0
  T_min: 180.0
  T_max: 400.0
  dT_max: 20.0

  nl_guess_u_start: [5.0, 0.0]
  nl_guess_u_stop: [5.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ==============================
conv:
  eps_state: [500, 1, 1, 50, 1, 1]
  eps_dyn: [50, 0.01, 0.01, 10, 0.01, 0.01]
  eps_cost: 1