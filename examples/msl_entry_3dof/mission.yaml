# ===============================
# FUNCTIONS
# ===============================
fcns.density_model: trajopt/library/missions/msl.py:exp_density_jax
fcns.nonlinear_aero: trajopt/library/missions/msl.py:nonlinear_aero_jax

# ===============================
# FUNCTION PARAMETERS
# ===============================
params.planet.inherit: trajopt/library/missions/shared/planet/mars.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/msl.yaml

# ===============================
# CONSTRAINT/COST PARAMS
# ===============================
constraints.initial_state.x: ["${params.planet.r + 126e3}", 0.0, 0.0, 5845, -15.47, 0.0]
constraints.initial_state.x_idx: [0, 1, 2, 3, 4, 5]

constraints.final_state.x: ["${params.planet.r + 10e3}", 0.0, 10.5768]
constraints.final_state.x_idx: [0, 1, 2]
constraints.final_state.eps: [100, 0.1, 0.1]

constraints.state_limits.x_min: ["${params.planet.r}", 100.0]
constraints.state_limits.x_min_idx: [0, 3]

constraints.bank_aoa_angle_limits.x_min: [-170.0, -5.0]
constraints.bank_aoa_angle_limits.x_min_idx: [0, 1]
constraints.bank_aoa_angle_limits.x_max: [170.0, 5.0]
constraints.bank_aoa_angle_limits.x_max_idx: [0, 1]

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================
constraint_list: [initial_state, final_state, state_limits, bank_aoa_angle_limits]
cost_list: [min_terminal_velocity]