# ===============================
# FUNCTION REGISTRY
# ===============================
fcns:
  coeffs: trajopt/missions/msl.py:coeffs_entry

# ===============================
# PARAMETERS
# ===============================

params:
  planet.inherit: trajopt/missions/configs/planets/mars.yaml
  vehicle.inherit: trajopt/missions/configs/vehicles/msl.yaml

# ===============================
# CONSTRAINTS
# ===============================

constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics

  initial_state:
    type: initial_state
    value: ["${params.planet.r + 126e3}", 0.0, 0.0, 5845, -15.47, 0.0]

  final_state:
    type: final_state
    value: ["${params.planet.r + 10e3}", 0.0, 10.5768, null, null, null]

  state_limits:
    type: state_limits
    lower: ["${params.planet.r + 1e3}", null, null, 10.0, null, null]

  bank_aoa_angle_limits:
    type: control_limits
    lower: [-178.0, -10.0]
    upper: [178.0, 10.0]
  
  final_time:
    type: final_time
    lower: 200.0
    upper:  8000.0

# ===============================
# COSTS
# ===============================

costs:
  min_terminal_velocity:
    type: terminal
    fcn: fcns.velocity

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - bank_aoa_angle_limits
  # - final_time

cost_list:
  - min_terminal_velocity