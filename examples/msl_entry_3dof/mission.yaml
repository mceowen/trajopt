# ===============================
# MISSION PARAMS
# ===============================

planet: 
  inherit: trajopt/library/missions/shared/planet/mars.yaml
vehicle:
  inherit: trajopt/library/missions/shared/vehicle/msl.yaml

flags:
  aero_type: 'exponential'  # 'exponential', 'jax_lookup', 'spline', 'none'

fcns:
  atmosphere_model_jax: trajopt/library/missions/msl.py:atmosphere_model_jax
  nonlinear_aero_jax: trajopt/library/missions/msl.py:nonlinear_aero_jax

constraints: 
- name: dynamics

- name: initial_state
  x: "eval: np.array([(params['mission']['planet']['r'] + 126e3), 0.0, 0.0, 5845, -15.47, 0.0])"
  x_idx: [0, 1, 2, 3, 4, 5]

- name: final_state
  x: "eval: np.array([(params['mission']['planet']['r'] + 10e3), 0.0, 10.5768])"
  x_idx: [0, 1, 2]
  eps: [100, 0.1, 0.1]

- name: state_limits
  x_min: "eval: np.array([params['mission']['planet']['r'], 100.0])"
  x_min_idx: [0, 3]

- name: bank_aoa_angle_limits
  x_min: [-170.0, -5.0]
  x_min_idx: [0, 1]
  x_max: [170.0, 5.0]
  x_max_idx: [0, 1]

costs:
- name: min_terminal_velocity