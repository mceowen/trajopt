# ===============================
# FUNCTIONS
# ===============================
fcns.density_model: trajopt/library/missions/msl.py:exp_density_jax
fcns.nonlinear_aero: trajopt/library/missions/msl.py:nonlinear_aero_jax
fcns.altitude: trajopt/library/models/reentry_3dof.py:altitude

# ===============================
# FUNCTION PARAMETERS
# ===============================
params.planet.inherit: trajopt/library/missions/shared/planet/mars.yaml
params.vehicle.inherit: trajopt/library/missions/shared/vehicle/msl.yaml

state.r.scale: 1000000
state.theta.scale: 1.0
state.phi.scale: 1.0
state.v.scale: 1000
state.gamma.scale: 1
state.psi.scale: 1

control.bank.scale: 1
control.aoa.scale: 1

time.scale: 1.0

phases:
  entry:
    start: 0
    p: 0
  
  descent:
    start: 70
    p: 1

# ===============================
# CONSTRAINT/COST PARAMS
# ==============================
constraints:
  initial_state:
    value: ["${params.planet.r + 126e3}", 0.0, 0.0, 5845, -15.47, 0.0]
    idx: [0, 1, 2, 3, 4, 5]

  final_state:
    value: ["${params.planet.r + 5e3}"]
    idx: [0]
    eps: [500]

  state_limits:
    min_value: ["${params.planet.r + 1e3}", 100.0]
    min_value_idx: [0, 3]

  bank_aoa_angle_limits:
    min_value: [-170.0, -5.0]
    min_value_idx: [0, 1]
    max_value: [170.0, 5.0]
    max_value_idx: [0, 1]

  chute_deploy:
    type: nonconvex_inequality
    fcn: trajopt/library/models/reentry_3dof.py:altitude
    nodes: ["${phases.descent.start}"]
    min_value: [8000]
    max_value: [12000]
    scale: [10000]
    eps: [100]
    dimension: 1

costs:
  control_rate_regularization:
    type: rate_regularization
    set: control
    norm: l2
    w: 1

  min_lonlat_error:
    type: min_norm_terminal
    idx: [1, 2]
    value: [0.0, 10.5768]

trajectories:
  lift_drag:
    type: time_series
    fcn: trajopt/library/missions/msl.py:lift_drag
    group: lift_drag

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================

constraint_list: 
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - bank_aoa_angle_limits
  - chute_deploy

cost_list: 
  - min_lonlat_error
