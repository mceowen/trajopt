# ===============================
# FUNCTION REGISTRY
# ===============================
fcns:
  coeffs: trajopt/missions/msl.py:coeffs_entry

# ===============================
# PARAMETERS
# ===============================

params:
  planet.inherit: trajopt/missions/planets/mars.yaml
  vehicle.inherit: trajopt/missions/vehicles/msl.yaml

# ===============================
# CONSTRAINTS
# ===============================
constraints:
  initial_state:
    value: ["${params.planet.r + 126e3}", 0.0, 0.0, 5845, -15.47, 0.0]
    idx: [0, 1, 2, 3, 4, 5]

  final_state:
    value: ["${params.planet.r + 10e3}", 0.0, 10.5768]
    idx: [0, 1, 2]
    eps: [1, 0.0001, 0.0001]

  state_limits:
    min_value: ["${params.planet.r + 1e3}", 10.0]
    min_value_idx: [0, 3]

  bank_aoa_angle_limits:
    min_value: [-178.0, -10.0]
    min_value_idx: [0, 1]
    max_value: [178.0, 10.0]
    max_value_idx: [0, 1]

# ===============================
# COSTS
# ===============================
costs:
  min_lonlat_error:
    type: min_norm_terminal
    idx: [1, 2]
    value: [0.0, 10.5768]

  control_rate_regularization:
    type: rate_regularization
    set: control
    w: 0.1

# ===============================
# TRAJECTORIES
# ===============================
trajectories:
  lift_drag:
    type: time_series
    fcn: fcns.lift_drag
    group: lift_drag

# ===============================
# ACTIVE CONSTRAINTS AND COSTS
# ===============================
constraint_list:
  - dynamics
  - initial_state
  - final_state
  - state_limits
  - bank_aoa_angle_limits

cost_list:
  - min_terminal_velocity
  # - control_rate_regularization