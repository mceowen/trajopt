inherit: trajopt/methods/configs/autoscvx.yaml
# inherit: trajopt/methods/configs/autoscvx-term-ps.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 40

# ===============================
# FLAGS
# ===============================
flags:
  ode_fixed_dt: 1
  equal_dt: 1
  free_final_time: 1
  flag_conv: 1
  ctcs: 0

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  t_start: 0.0
  t_stop: 100.0

  u_start: [0.0, 0.0]
  u_stop: [0.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state:  [50, 0.01, 0.01, 5, 0.01, 0.01]
  eps_cost:   0.1
  eps_defect: [0.01]
  eps_dyn:    [10.0, 0.01, 0.1, 30.0, 0.01, 0.01]
  iter_max:   200

solver_opts:
  solver: CLARABEL