problem:
  # ===============================
  # INHERIT MODEL CONFIGS
  # ===============================
  inherit: ../../models/configs/reentry_3dof.yaml

  # ===============================
  # FUNCTION REGISTRY
  # ===============================
  fcns:
    nonlinear_aero: rlv_entry.py:nonlinear_aero

  # ===============================
  # PARAMETERS
  # ===============================
  params:
    planet:
      inherit: ../configs/planets/earth.yaml
      omega: 0.0

    vehicle:
      inherit: ../configs/vehicles/rlv.yaml

  # ===============================
  # CONSTRAINTS
  # ===============================
  constraints:
    dynamics:
      type: dynamics
      fcn: fcns.dynamics

    initial_state:
      type: initial_state
      value: ["${params.planet.r + 79248.0}", 0.0, 0.0, 7802.88, -1.0, 90.0]

    final_state:
      type: final_state
      value: ["${params.planet.r + 24384.0}", null, null, 762.0, -5.0, null]
      eps: [100, 10, 0.1]

    state_limits:
      type: state_limits
      lower: ["${params.planet.r}",            -180, -70,    10.0, -80.0, -180]
      upper: ["${params.planet.r + 400000.0}",  180,  70, 45000.0,  80.0, 180]

    control_limits:
      type: control_limits
      lower: [-90.0, -90]
      upper: [1.0, 90]

  # ===============================
  # COSTS
  # ===============================
  costs:
    max_crossrange:
      type: terminal_state
      idx: [2]
      sign: -1

    # min_terminal_velocity:
    #   type: terminal
    #   fcn: fcns.velocity

# ===============================
# METHOD CONFIGURATION
# ===============================
method.inherit: method.yaml


# ===============================
# ANALYSIS CONFIGURATION
# ===============================
analysis:
  type: standalone
  
  compute_iters: false
  show_iters: false
  show_convergence: false
  show_weights: false