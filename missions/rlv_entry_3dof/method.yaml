inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 150

# ===============================
# FLAGS
# ===============================
flags:
  ode_fixed_dt: 1
  equal_dt: 1
  free_final_time: 1
  flag_conv: 1

# ===============================
# INITIAL GUESS SETTINGS
# ===============================
guess:
  type: straight_line
  
  t_start: 0.0
  t_stop:  1000.0

  x_start: ["${params.planet.r + 79248.0}", 0.0, 0.0, 7802.88, -1.0,  90.0]
  x_stop:  ["${params.planet.r + 24384.0}" , 10,  10,   762.0, -5.0, -90.0]

  u_start: [0.0, 0.0]
  u_stop:  [0.0, 0.0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================
conv:
  eps_state:  [5, 0.0001, 0.0001, 5, 0.0001, 0.0001]
  eps_cost:   0.001
  eps_defect: [0.01]
  eps_dyn:    [100.0, 0.1, 0.1, 30.0, 0.1, 0.1]
  iter_max:   400

# ===============================
# SOLVER OPTIONS
# ===============================
solver_opts:
  solver: QOCO
