problem:
  # source: https://underactuated.mit.edu/trajopt.html#perching

  # ===============================
  # INHERIT MODEL CONFIGS
  # ===============================
  inherit: model.yaml

  # ===============================
  # PARAMETERS
  # ===============================
  params:
    Sw: 0.0885
    Se: 0.0147
    lw: 0
    le: 0.022
    # self.lh = 0.317
    lh: 0.27
    inertia: 0.0015
    m: 0.08
    rho: 1.204
    g: 9.81

  # ===============================
  # CONSTRAINTS
  # ===============================
  constraints:
    dynamics:
      type: dynamics
      fcn: fcns.dynamics

    initial_state:
      type: initial_state
      value: [-3.5, 0.1, 0, 0, 7.0, 0, 0]

    final_state:
      type: final_state
      value: [0, 0, null, null, null, null, null]

    state_limits:
      type: state_limits
      lower: [null, null, -0.9473, null, null, null, null]
      upper: [null, null, 0.4463, null, null, null, null]

    terminal_box:
      type: nonconvex_inequality
      fcn: fcns.terminal_box
      nodes: [-1]
      lower: [-2.0, -2.0, -1.0]
      upper: [2.0, 2.0, "${-np.pi / 6.0}"]

  # ===============================
  # COSTS
  # ===============================
  costs:
    u_squared:
      type: running
      fcn: fcns.u_squared_cost
      w: 100

# ===============================
# METHOD CONFIGURATION
# ===============================
method.inherit: method.yaml

# ===============================
# ANALYSIS CONFIGURATION
# ===============================
analysis:
  type: standalone
  
  compute_iters: false
  show_iters: false
  show_convergence: false
  show_weights: false
