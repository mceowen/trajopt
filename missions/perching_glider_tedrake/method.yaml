inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 20

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  free_final_time: 1
  

guess:
  type: propagation
  t_start: 0.0
  t_stop: 0.8

  u_start: [0]
  u_stop: [0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.005
  eps_dyn:    0.00001
  eps_defect: 1.0
  eps_cost:   1

solver_opts:
  solver: CLARABEL