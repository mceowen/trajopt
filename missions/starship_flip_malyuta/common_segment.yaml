# ===============================
# INHERIT MODEL CONFIGS
# ===============================
inherit: model.yaml

# ===============================
# PARAMETERS
# ===============================
params:
  gamma_gs: 60
  g: 9.81
  rs: 4.5
  ls: 50.0
  mass: 120000
  Isp: 330
  lcg: "${0.4 * ls}"
  lcp: "${0.45 * ls}"
  J: "${1 / 12 * mass * (6 * rs**2 + ls**2)}"
  vterm: 85
  cd: "${1.2 * mass * g / (vterm**2)}"
  alpha: "${-1 / (Isp * g)}"

# ===============================
# CONSTRAINTS
# ===============================
constraints:
  dynamics:
    type: dynamics
    fcn: fcns.dynamics

  state_limits:
    type: state_limits
    lower: [null, 0,    null, null, "${np.deg2rad(-45.0)}", null]
    upper: [null, null, null, null,  "${np.deg2rad(90.0)}", null]

  control_limits:
    type: control_limits
    lower: [880000, "${np.deg2rad(-10)}"]
    upper: [6000000, "${np.deg2rad(10)}"]

  glide_slope:
    type: convex_inequality
    fcn: fcns.cvx_glide_slope

# ===============================
# COSTS
# ===============================
costs:
  # min_time:
  #   type: min_time

  u_squared:
    type: running
    fcn: fcns.u_squared_cost
    scale: 1000000000000
    w: 10