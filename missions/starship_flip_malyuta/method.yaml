inherit: trajopt/methods/configs/autoscvx.yaml

# ===============================
# GRID SETTINGS
# ===============================
time_grid: 40

# ===============================
# INITIAL GUESS SETTINGS
# ===============================

flags:
  equal_dt: 1
  free_final_time: 0
  zoh_dilation: 1
  flag_conv: 1

guess:
  type: straight_line
  t_start: 0.0
  t_stop: 20

  x_start: [100.0, 600.0, 0, "${-params.vterm}", "${np.deg2rad(90.0)}", 0.0]
  x_stop: [0, 0, 0, -0.1, 0, 0]

  u_start: [500000, 0]
  u_stop: [500000, 0]

# ===============================
# CONVERGENCE TOLERANCES
# ===============================

conv:
  eps_state:  0.0001
  eps_dyn:    0.001
  eps_defect: 1.0
  eps_cost:   1
  iter_max: 300

solver_opts:
  solver: CLARABEL