problem:
  # ===============================
  # INHERIT MODEL CONFIGS
  # ===============================
  inherit: ../../models/configs/reentry_3dof.yaml

  # ===============================
  # FUNCTIONS
  # ===============================
  fcns:
    density_model: msrl.py:density_model
    nonlinear_aero: msrl.py:nonlinear_aero

  # ===============================
  # PARAMETERS
  # ===============================
  params:
    planet:
      inherit: ../configs/planets/mars.yaml
    vehicle:
      inherit: ../../local/vehicles/msrl.yaml

  # ===============================
  # CONSTRAINTS
  # ===============================
  constraints:
    dynamics:
      type: dynamics
      fcn: fcns.dynamics

    initial_state:
      type: initial_state
      value: [3456160, 68.20, 14.12, 7935.15, -7.7075, 62.2803]

    # initial_bank_angle:
    #   type: control_limits
    #   lower: [120, null]
    #   upper: [120, null]
    #   nodes: [0]

    final_state:
      type: final_state
      # value: ["${params.planet.r + 10e3}", null, null, null, null, null]
      value: [3404010, 76.14, 17.91, null, null, 64.5]

    state_limits:
      type: state_limits
      lower: ["${params.planet.r}", null, null, 100.0, null, null]

    bank_aoa_angle_limits:
      type: control_limits
      lower: [-360.0, null]
      upper: [360.0, null]

    bank_angle_rate_limit:
      type: control_rate_limit
      value: [10]
      idx: [0]

    # fpa_upper_bound:
    #   type: nonconvex_inequality
    #   fcn: fcns.fpa
    #   upper: 2
    #   scale: [1]
    #   eps: [0.01]

    # terminal_fpa:
    #   type: nonconvex_inequality
    #   fcn: fcns.fpa
    #   lower: -2
    #   upper: 2
    #   scale: [1]
    #   eps: [0.01]
    #   nodes: [-1]

  # ===============================
  # COSTS
  # ===============================
  costs:
    min_terminal_velocity:
      type: terminal
      fcn: fcns.velocity

    # control_regularization:
    #   type: rate_regularization
    #   set: control
    #   w: 10.0

# ===============================
# METHOD CONFIGURATION
# ===============================
method.inherit: method.yaml

# ===============================
# ANALYSIS CONFIGURATION
# ===============================
analysis:
  type: standalone
  
  compute_iters: false
  show_iters: false
  show_convergence: false
  show_weights: false
